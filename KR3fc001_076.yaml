body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋襄分以御貴賤禀稅襄分襄分差也術曰各置列襄列表相與率也重疊則可約副并為法以所分乘未并者各自為實法集而襄別數本一也今以所分乘上別以下集除之一乘一除適足相消故所分猶存且各應率而別也於今有術列衰各為所求率副并為所有率所分為所有數又以經分言之假令甲家三人乙家二人丙家一人并六人共分十二為人得二也欲復作逐家者則當列置人數以一人所得乘之今此術先乘而後除也實如法而一不滿法者以法命之今有大夫不更簮裊上造公士凡五人共獵得五鹿欲以爵次分之問各得幾何答曰大夫得一鹿三分鹿之二不更得一鹿三分鹿之一簮裊得一鹿
