body:
  text: 率得五所有之率得二故五乘二除羲由於此今有糲飯七斗六升七分升之四欲為飱問得幾何答曰為飱九斗一升三十五分升之三十一術曰以糲飯求飱六之五而一臣淳風等謹按飱率九十為糲飯所求冝以飱乘此率術欲從省先以等數十五約之所求之率得六所有之率得五以此故六除五除也今有菽一斗於為熟菽問得幾何答曰為熟菽二斗三升術曰以菽求熟菽二十三之十而一臣淳風等謹按熟菽之率一百三半因其有半各以母二通之冝以熟菽數乘此率術欲從省先以等數九約之所求之率得一十一半所有之率得五也今有菽二斗欲為豉問得幾何答曰為豉二斗八升術曰以菽求豉七之五而一臣淳風等謹按豉率六十三為菽所求冝以豉乘此率術欲從省先以等數九約之所求之率得七而所有之率得五也
