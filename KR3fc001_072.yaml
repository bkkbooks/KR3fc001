body:
  text: 今有出錢九百八十買矢幹五千八百二十枚欲其貴賤率之問各幾何答曰其三百枚五枚一錢其五千五百二十枚六枚一錢反其率臣淳風等謹按其率者錢多物少反其率知錢少物多多少相反故曰反其率也其率者以物數為法錢數為實反之知以錢數為法物數為實不滿法知實餘也當以餘物化為錢矣法為凡錢而今以化錢减之故以實减法法少知經分之所得故曰法少實多者餘分之所益故曰實多乘實冝以多乘法冝以少故曰各以其所得多少之數乘法實即物數其求石鈞斤兩以積銖各除法實各得其數餘各為銖者謂之石鈞斤兩積銖除實石鈞斤兩積銖除法餘各為銖即合所問術曰以錢數為法所率為實實如法而一不滿法者反以實减法法少實多二物各以所得多少之數乘法實即物數其率按出錢六百二十買羽二千一百翭反之當二百四十錢一錢四翭其三百八十錢一錢三翭是錢有二價物有貴賤故以羽乘錢反二率也臣淳風等謹按其率者以物數為法錢為實反之者以錢數為法物為實不滿法者實餘也當以餘物化為錢矣法為凡錢而今以化錢减之故曰反以實减法也法少者知經分之所得故曰法少實多
