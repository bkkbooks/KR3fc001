body:
  text: 答曰九分步之四乘分臣淳風等謹按乘分者分母相乘為法子相乘為實故曰乘分術曰母相乘為法子相乘為實實如法而一凡實步蒲法者而有母子之名若有分以乘其實而長之則亦滿法乃為全耳又以子有所乘故母當報除報除者實如法而一也今子相乘則母各當報除因令分母相乘而連除也此田有廣從難以廣諭設有問者曰馬二十匹直金十二斤今賣馬二十匹三十五人分之人得幾何答曰三十五分斤之十二其為之也當如經分術以十二斤金為實三十五人為法設更言馬五匹直金三斤今賣四匹七人分之人得幾何答曰人得三十五分斤之十二其為之也當齊其金人之數皆合初問
