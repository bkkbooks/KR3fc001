body:
  text: 周一丈四尺外周二丈四尺廣五尺深一丈問積幾何答曰一千八百八十三尺三寸少半寸今有盤池上廣六丈袤八丈下廣四丈袤六丈深二丈問積幾何答曰七萬六百六十六尺太半尺負土往來七十步其二十步上下棚除棚除二當平道五踟蹰之間十加一載輸之間三十步定一返一百四十步土籠積一尺六寸秋程人功行五十九里半問人到積尺用徒各幾何答曰人到二百四尺用徒三百四十六人一百五十三分人之六十二術曰以一籠積尺乘程行步數為實往來上下棚除二當平道五棚閣除邪道有上下之難故使二當
  hash: sha256:4146c021dc9a53cdbddb59aff4f17f835d7fd0a63e9a61f2018f4560c52f9a3b
