body:
  text: 規多少之覺乃弓之與弦也然丗傅此法莫肯精核學者踵古習其謬失不有明據辨之斯難凡物類形象不圎則方方圎之率誠著於近則雖逮可知也由此言之其用博矣謹按圎驗更造密率恐空設法數昧而難譬故置諸撿括謹詳其記注馬割六弧以為十二弧術曰置圎徑二尺半之為一尺即圎裹弧之靣也令半徑一尺為弦半靣五寸為句為之求股以句羃二十五寸減弦羃餘七十五寸開方除之下至秒忽又一退法求其微數微數無名知以為分子以下為分母約作五分忽之二故得股八寸六分六氂二絲五忽五分忽之二以減半徑餘一寸三分三氂九毫七秒四忽五分忽之三謂之小句小句知半靣五寸之句弧之半靣而又謂之小股為之求弦其羃二千六百七十九億四千九百一十九萬三千四百四十五忽全分并之開方除之即十二弧之一靣也割十二弧以為二十四弧術曰亦令半徑為弦半靣為句為之求股置上小弦羃四而一得六百六十九億八千七百二十九萬八千三百六十一忽於分棄之即句羃也以減弦羃其餘開方除之得股九寸六分五氂九毫二秒五忽五分忽之四以減半徑餘三分四氂七秒四忽五分忽之一謂之小句弧之半靣又謂之小股為之求小弦其羃六百八十一億四千八百三十四萬九千四百六十六忽餘分棄之開方除之即二十四弧之一靣也割二十四弧以為四十八弧術曰亦令半徑為弦半靣為句為之求股置上小弦羃四而一得一百七十億三千七百八萬七千三百六十六忽餘分棄之即句羃也以減弦羃其餘開方除之得股九寸九分一氂四毫四秒四忽五分忽之四以減半徑餘八氂五毫五秒五忽
