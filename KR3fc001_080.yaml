body:
  text: 今有甲持錢五百六十乙持錢三百五十丙持錢一百八十凡三人俱出關關稅百錢欲以錢數多少襄出之問各幾何答曰甲出五十一錢一百九分錢之四十一乙出三十二錢一百九分錢之一十二丙出一十六錢一百九分錢之五十六術曰各置錢數為列襄副并為法以百錢乘未并者各自為實實如法得一錢臣淳風等謹按此術甲乙丙持錢數以為列襄副并為所有率未并者各為所求率百錢為所有數而今有之即得今有女子善織日自倍五日織五尺問日織幾何答曰初日織一寸三十一分寸之十九
