body:
  text: 為米二十一斛七百二十九分斛之六百九十一於徽術當米二十斛三萬八千一百五十一分斛之三萬六千九百八十臣淳風等謹依密率為米二十斛二千六百七十三分斛之二千五百四十委粟術曰下周自乘以髙乘之三十六而一此猶圎錐也於徽術亦當下周自乘以髙乘之又以二十五乘之九百四十二而一也其依垣者居圎雖之半也十八而一於徽術當令此下周自乘以髙乘之又以二十五乘之四百七十一而一依垣之周半於全周其自乘之羃居全周自乘之羃四分之一故半全周之法以為法也其依垣內角者角隅也居圎錐四分之一也九而一於徽術當令此下周自乘而倍之以髙乘之又以二十五乘之四百七十一而一依隅之周半於依垣其自乘之羃居依垣自乘之羃四分之一當半依垣之法以為法法不可半故倍其實又此術亦用周三徑一之率假令以三除周得徑若不盡通分內子即為徑之積分令自乘以髙乘之為三方錐之積分母自相乘得九為法又當三而一得方錐之積從方錐中求圎錐之積亦猶方羃求圎羃乃當三乘之四而一方錐得圎羃之積前求方積乃合三而一今求圎錐之積復合三乘之二母既同故相凖折惟以四乘分母九得三十六而連除圎錐之積其圎錐之積與平地聚粟同故三十六而一臣淳風等謹依密
