body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋方田以御田疇界域今有田廣十五歩從十六歩問爲田幾何荅曰一畒文有田廣十二歩從十四歩問爲田幾何百六十八歩圗從十四廣十二術曰廣從歩數相乗得積歩此積謂凡廣從相乗謂之羃臣淳風等謹按經云廣從相乗得積歩注云廣從相乗謂之羃觀斯注意積羃義同以理推之固當不爾何則羃是方靣單布之名積乃衆數聚居之稱循名責實二者全殊雖欲同之竊恐不可今以凡言羃者據廣從之一方其言積者舉衆歩之都數經云相乗得積歩即是都數之明文注云謂之爲羃全乖積歩之本意此經注前云積爲田羃於理得通復云謂之爲羃繁而不當今者注釋存善去非略爲科簡遺諸後學以畒法二百四十歩除之即畒數畒爲一頃臣淳風等謹按此爲篇端故特數頃畒二法餘術不復言者從此可知
