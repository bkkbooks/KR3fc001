body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋方田以御田疇界域今有田廣十五步從十六步問為田幾何答曰一畒文有田廣十二步從十四步問為田幾何百六十八步圗從十四廣十二術曰廣從步數相乘得積步此積謂凡廣從相乘謂之羃臣淳風等謹按經云廣從相乘得積步注云廣從相乘謂之羃觀斯注意積羃義同以理推之固當不爾何則羃是方靣單布之名積乃衆數聚居之稱循名責實二者全殊雖欲同之竊恐不可今以凡言羃者據廣從之一方其言積者舉衆步之都數經云相乘得積步即是都數之明文注云謂之為羃全乖積步之本意此經注前云積為田羃於理得通復云謂之為羃繁而不當今者注釋存善去非略為科簡遺諸後學以畒法二百四十步除之即畒數畒為一頃臣淳風等謹按此為篇端故特數頃畒二法餘術不復言者從此可知
