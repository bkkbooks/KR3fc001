body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋粟米以御交質變易粟米之法凡此諸率相與大通其特相求各如本率可約者約之别術然也粟率五十糲米三十粺米二十七糳米二十四御米二十一小䵂十三半大䵂五十四糲飯七十五粺飯五十四糳飯四十八御飯四十二菽荅麻麥各四十五稻六十豉六十三飧九十熟菽一百三半一糵一百七十五今有此都術也凡九數以爲篇名可以廣施諸率所謂告往而知來舉一隅而三隅反者也誠能分詭數之紛雜通彼此之否塞因物成率審辨名分平其偏頗齊其參差則終無不歸於此術也術曰以所有數乗所求率爲實以所有率
