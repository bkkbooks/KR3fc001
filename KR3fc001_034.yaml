body:
  text: 曰十二而一即十二弧之羃也今此令周自乘非但若為圎徑自乘者九方而巳然則十二而一所得又非十二弧之類也若欲以為圎羃失之於多矣以六弧之周十二而一可也於徽新術直令圎周自乘又以二十五乘之三百一十四而一得圎羃其率三百一十四者周自乘之羃也置周數六尺二寸八分令自乘得羃三十九萬四千三百八十四分又置圎羃三萬一千四百分皆以一千二百五十六約之得此率臣淳風等謹按方靣自乘即得其積圎周求其羃股率乃通但此術所求用三一為率圎田正法半周及半徑以相乘令乃用全周自乘故須以十二為母何者據全周而求半周則須以二為法就全周而求半徑復假六以除之是二六相乘除周自乘之數依密率以七乘之八十八而一今有宛田下周三十步徑十六步問為田幾何答曰一百二十步又是宛田下周九十九步徑五十一步問為田幾何答曰五畒六十二步四分步之一術曰以徑乘周四而一此術不驗故推方錐以見其形假令方錐下方六尺髙四尺四尺為股下方之半三尺為句正靣邪為弦弦五尺也令句股相乘四因之得六十尺即方錐四靣見者之羃若令其中容圎錐圎錐見羃與方錐見羃其率猶方羃之與圎羃也按方錐下六尺則方周二十四尺以五尺乘而半
