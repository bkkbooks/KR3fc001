body:
  text: 芻童曲池盤池冥谷皆同術術曰倍上袤下袤從之亦倍下袤上袤從之各以其廣乘之并以髙若深乘之皆六而一按此術假令芻童上廣一尺袤二尺下廣三尺袤四尺髙一尺其用棊也中央立方二四靣塹堵六四角陽馬四倍下袤為八上袤從之為十以廣乘之得積三十尺是為得中央立方各三兩端塹堵各四兩旁塹堵各六四角陽馬亦各六後倍下袤從之為八以髙廣乘之得積八尺是為得中央立方亦各三兩端塹堵各二并兩旁三品棊皆一而為六故六而一即得為術又可令上下廣袤差相乘以髙乘之三而一亦四陽馬上下廣袤互相乘并而半之以髙乘之即四靣六塹堵與二立方並之為芻童積又可令上下廣袤互相乘而半之上下廣袤又各自乘並以髙乘之三而一即得也其曲池者并上中外周而半之以為上袤亦并下中外周而半之以為下袤此池環而不通匝形如盤蛇而曲之亦云周者謂如委穀依垣之周耳引而伸之周為袤求袤之意環田也今有芻童下廣二丈袤三丈上廣三丈袤四丈髙三丈問積幾何答曰二萬六千五百尺今有曲池上中周二丈外周四丈廣一丈下中
