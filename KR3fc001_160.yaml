body:
  text: 芻童曲池盤池冥谷皆同術術曰倍上袤下袤從之亦倍下袤上袤從之各以其廣乗之并以髙若深乗之皆六而一按此術假令芻童上廣一尺袤二尺下廣三尺袤四尺髙一尺其用棊也中央立方二四靣壍堵六四角陽馬四倍下袤爲八上袤從之爲十以廣乗之得積三十尺是爲得中央立方各三兩端壍堵各四兩旁壍堵各六四角陽馬亦各六後倍下袤從之爲八以髙廣乗之得積八尺是爲得中央立方亦各三兩端壍堵各二并兩旁三品棊皆一而爲六故六而一即得爲術又可令上下廣袤差相乗以髙乗之三而一亦四陽馬上下廣袤互相乗并而半之以髙乗之即四靣六壍堵與二立方並之爲芻童積又可令上下廣袤互相乗而半之上下廣袤又各自乗並以髙乗之三而一即得也其曲池者并上中外周而半之以爲上袤亦并下中外周而半之以爲下袤此池環而不通匝形如盤蛇而曲之亦云周者謂如委穀依垣之周耳引而伸之周爲袤求袤之意環田也今有芻童下廣二丈袤三丈上廣三丈袤四丈髙三丈問積幾何荅曰二萬六千五百尺今有曲池上中周二丈外周四丈廣一丈下中
  hash: sha256:1e9bdd9f9e26418580efffbcbc63bb50015981249d2d3a1f5cfa2c51fe58c829
