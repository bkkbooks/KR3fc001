body:
  text: 曰十二而一即十二弧之羃也今此令周自乗非但若爲圎徑自乗者九方而巳然則十二而一所得又非十二弧之類也若欲以爲圎羃失之於多矣以六弧之周十二而一可也於徽新術直令圎周自乗又以二十五乗之三百一十四而一得圎羃其率三百一十四者周自乗之羃也置周數六尺二寸八分令自乗得羃三十九萬四千三百八十四分又置圎羃三萬一千四百分皆以一千二百五十六約之得此率臣淳風等謹按方靣自乗即得其積圎周求其羃股率乃通但此術所求用三一爲率圎田正法半周及半徑以相乗令乃用全周自乗故湏以十二爲母何者據全周而求半周則湏以二爲法就全周而求半徑復假六以除之是二六相乗除周自乗之數依宻率以七乗之八十八而一今有宛田下周三十歩徑十六歩問爲田幾何荅曰一百二十歩又是宛田下周九十九歩徑五十一歩問爲田幾何荅曰五畒六十二歩四分歩之一術曰以徑乗周四而一此術不驗故推方錐以見其形假令方錐下方六尺髙四尺四尺爲股下方之半三尺爲句正靣邪爲弦弦五尺也令句股相乗四因之得六十尺即方錐四靣見者之羃若令其中容圎錐圎錐見羃與方錐見羃其率猶方羃之與圎羃也按方錐下六尺則方周二十四尺以五尺乗而半
