body:
  text: 春程人功七百六十六尺并出土功五分之四定功六百一十二尺五分尺之四問用徒幾何荅曰七人三千六十四分人之四百二十七術曰置本人功去其五分之一餘爲法去其五八之一者謂以四乗五除也以溝積尺爲實實如法而一得用徒人數按此術本置人功去其五分之一者謂以四乗之五而一除去出土之功取其定功乃通分内子以爲法以分母乗溝積尺爲實者法裏有分實裹通之故實如法而一即用徒人數此以一人之積尺除其衆尺故用徒人數不盡者等數約之而命分也今有壍上廣一丈六尺三寸下廣一丈深六尺三寸袤一十三丈二尺一寸問積幾何荅曰一萬九百四十三尺八寸八寸者謂穿地方尺深八寸此積餘有方寸中二八四氂五毫乗之貴欲從易非其常定也夏程人功八百七十一尺并出土功五分之一沙礫水石之功作太半定功二百三十二
  hash: sha256:f4f9f6e9d19e0866b9a52d96861653d688feaede4c480a1beb33131a19fd7632
