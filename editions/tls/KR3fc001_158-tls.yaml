body:
  text: 與鼈腝連也并三廣以髙袤乗六而一皆其積也今此羨除之廣即壍堵之袤也按此本是三廣不等即與鼈腝連者別而言之中央壍堵廣六尺髙三尺袤七尺末廣之兩旁各一小鼈腝皆與壍堵等令小鼈腝居裏大鼈腝居表則大鼈腝皆出隨方錐下廣二尺袤六尺髙七尺分取其半則爲袤三尺以髙廣乗之三而一即半錐之積也邪解半錐得此兩大鼈腝求其積亦當六而一合於常率矣按陽馬之棊兩邪棊底方當其方也不問旁角而割之相半可知也推此上連無成不方故方錐與陽馬同實角而割之者相半之勢此大小鼈腝可知更相表裏但體有背正也今有芻甍下廣三丈袤四丈上袤二丈無廣髙一丈問積幾何荅曰五千尺術曰倍下袤上袤從之以廣乗之又以髙乗之六而一推明義理者舊說云凡積芻甍有上下廣曰童甍謂其屋蓋之茨也是故甍之下廣袤與童之上廣袤等正斬方亭兩邊合之即芻甍之形也假令下廣二尺袤三尺上袤一尺無廣髙一尺其用棊也中央壍堵二兩端陽馬各二倍下袤上袤從之爲七尺以髙廣乗之得羃十四尺陽馬之羃各居二壍堵之羃各居三以髙乗之得積十四尺其於本棊也皆一而爲六故六而一即得亦可令上下袤差乗廣以髙乗之三而一即四陽馬也下廣乗之上袤而半之髙乗之即二壍堵并之以爲甍積也
