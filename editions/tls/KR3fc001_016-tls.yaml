body:
  text: 荅曰九分歩之四乗分臣淳風等謹按乗分者分母相乗爲法子相乗爲實故曰乗分術曰母相乗爲法子相乗爲實實如法而一凡實歩蒲法者而有母子之名若有分以乗其實而長之則亦满法乃爲全耳又以子有所乗故母當報除報除者實如法而一也今子相乗則母各當報除因令分母相乗而連除也此田有廣從難以廣諭設有問者曰馬二十匹直金十二斤今賣馬二十匹三十五人分之人得幾何荅曰三十五分斤之十二其爲之也當如經分術以十二斤金爲實三十五人爲法設更言馬五匹直金三斤今賣四匹七人分之人得幾何荅曰人得三十五分斤之十二其爲之也當齊其金人之數皆合初問
