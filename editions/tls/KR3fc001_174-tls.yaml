body:
  text: 荅曰三尺五分尺之三術曰置垣積尺四之爲實實穿地四爲堅三垣堅也以堅求穿地當四之三而一也以深袤相乗爲深袤之立實也又以三之爲法以深袤乗之立實除垣積則阬廣又三之者與堅率并除之所得倍之阬有兩廣先并而半之即爲廣狹之中平令先得其中平故又倍之知兩廣全也減上廣餘即下廣按此術穿地四爲堅三垣即堅也今以堅求穿地當四乗之三而一深袤相乗者爲深袤立羃以深袤立羃除積即阬廣又三之爲法與堅率并除所得倍之者爲阬有兩廣先并而半之爲中平之廣今此得中平之廣故倍之還爲兩廣并故减上廣餘即下廣也今有倉廣三丈袤四丈五尺容粟一萬斛問髙幾何荅曰二丈術曰置粟一萬斛積尺爲實廣袤相乗爲法實如法而一得髙尺以廣袤之羃除積故得髙按此術本以廣袤相乗以髙乗之得此積今還元置此廣袤相乗爲法除之故得髙也今有圎囷圎囷廪也亦云圎囤也髙一丈三尺三寸少半寸容米二千斛問周幾何荅曰五丈四尺於徽術當周五丈五尺二寸二十分寸之
