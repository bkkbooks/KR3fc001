body:
  text: 之得一頭之立羃又以袤乗之者得立實之積故爲積尺今有城下廣四丈上廣二丈髙五丈袤一百二十六丈五尺問積幾何荅曰一百八十九萬七千五百尺今有垣下廣三尺上廣二尺髙一丈二尺袤二十二丈五尺八寸問積幾何荅曰六千七百七十四尺今有隄下廣二丈上廣八尺髙四尺袤一十二丈七尺問積幾何荅曰七千一百一十二尺冬程人功四百四十四尺問用徒幾何荅曰一十六人一百一十一分人之二術曰以積尺爲實程功尺數爲法實如法而一即用徒人數今有溝上廣一丈五尺下廣一丈深五尺袤七丈問積幾何荅曰四千三百七十五尺
