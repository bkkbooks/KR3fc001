body:
  text: 術曰以一車積尺乗程行歩數爲實置今往來歩數加載輸之間一里以車六人乗之爲法除之所得即一人所到尺按此術今有之義以載輸及往來并得五百歩爲所有行率車載三十四尺七寸爲所求到土率程行五十八里通之爲歩爲所有數而今有之所得則一車所到欲得人到者當以六人除之即得術有分故亦更令乗法而并除者亦用以半尺數以爲一人到土率六人乗五百歩爲行率也又亦可五百歩爲行率令六人約半積尺數爲一人到土率以載土術入之入之者亦可求返數也要取其會通而巳術恐有分故令乗法而并除以所到積尺約即用徒人數者以一人所積尺除其衆積故得用徒人數也以所到約積尺即用徒人數今有委粟平地下周一十二丈髙二丈問積及爲粟幾何荅曰積八千尺於徽術當積七千六百四十三尺一百五十七分尺之四十九臣淳風等謹依宻率爲積七千六百三十六尺十一分尺之四爲粟二千九百六十二斛二十七分斛之二十六於徽術當粟二千八百三十斛一千四百
