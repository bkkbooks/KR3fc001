body:
  text: 半徑其餘即小弦之矢也割之又割使至極細但舉弦矢相乗之數則必近宻率矣然於筭數差繁必欲有所尋究也若但度田取其大數舊術爲約耳令有環田中周九十二歩外周一百二十二歩徑五歩此欲令與周三徑一之率相應故言徑五歩也據中外周以徽術言之當徑四歩一百五十七分歩之一百二十二也臣淳風等謹按依宻率合徑四歩二十二分歩之十七問爲田幾何荅曰二畒五十五歩於徽術當爲田二畒三十一歩一百五十七分歩之二十三臣淳風等依宻率爲田二畒三十歩二十二分歩之十五又有環田中周六十二歩四分歩之三外周一百一十三歩二分歩之一徑十二歩三分歩之二此田環而不通匝故徑十二歩三分歩之二若據上周求徑者此徑失之於多過周三徑一分率蓋爲踈矣於徽術當徑八歩六百二十八分歩之五十一臣淳風等謹按依周三徑一考之合徑八歩二十四分歩之一十一依宻率合徑八歩一百七十六分歩之一十三問爲田幾何荅曰四畒一百五十六歩四分歩之一於徽術當爲田二畒二百三十二歩五千二十四分歩之七百八十七也依周三徑一爲田三畒二十五歩六十四分歩之二十五臣淳風
