body:
  text: 荅曰六錢四分錢之三術曰以月三十日乗千錢爲法以三十日乗千錢爲法者得三萬是爲貸人錢三萬一日息三十也以息三十乗今所貸錢數又以九日乗之爲實實如法得一錢以九日乗今所貸錢爲今一日所有錢於今有術爲所有數息三十爲所求率三萬錢爲所有率此又可以一月三十日約息三十錢爲十分一日以乗今一日所有錢爲實千錢爲法爲率者當等之於一也故三十日或可乗本或可約息皆所以等之也九章筭經卷第三
