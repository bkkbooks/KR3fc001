body:
  text: 以爲法置田二百四十歩亦以一爲二千五百二十乗之爲實實如法得從歩今有田廣一歩半三分歩之一四分歩之一五分歩之一六分歩之一七分歩之一八分歩之一九分歩之一十分歩之一求田一畒問從幾何荅曰八十一歩七千三百八十一分歩之六千九百三十九術曰下有一十分之一爲二千五百二十半爲一千二百六十三分之一爲八百四十四分之一爲六百三十五分之一爲五百四六分之一爲四百二十七分之一爲三百六十八分之一爲三百一十五九分之一爲二百八十十分之一爲二百五十二并之得七千三百八十一以爲法置田二百四十歩亦以一爲二千五百二十乗之爲實實如法得從歩今有田廣一歩半三分歩之一四分歩之一五
