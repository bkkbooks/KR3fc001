body:
  text: 荅曰爲糳米二斗一升五分升之三術曰以粟米糳米十二之二十五而一臣淳風等謹按粺米之率二十有四以爲率太繁故因而半之故半所求之率以乗所有之數所求之率旣减半所有之率亦减半是故十二乗之二十五而一也今有粟七斗九升欲爲御米問得幾何荅曰爲御米三斗三升五十分升之九術曰以粟求御米二十一之五十而一今有粟一斗欲爲小䵂問得幾何荅曰爲小䵂二升一十分升之七術曰以粟米小䵂二十七之百而一臣淳風等謹按小䵂之率十三有半半者二爲母以二通之得二十七爲所求率又以母二通其粟率得一百爲所有率凡本率有分者湏即乗除也他皆放此今有粟九斗八升欲爲大䵂問得幾何荅曰爲大䵂一十斗五升二十五分升之二十一術曰以粟求大䵂二十七之二十五而一臣淳風等謹按大䵂之率五十有四其可半故二十七之亦如粟求糳米半其二率
