body:
  text: 之返㐮人數不同則分數不齊當令母互乗子母互乗子則動者爲不動者㐮也亦可先同其母各以分母約其子爲返㐮副并爲法以所分乗未并者各自爲實實如法而一術曰列置㐮而令相乗動者爲不動者衰今有大夫不更簮褭上造公士凡五人共出百錢欲令髙爵出少以次漸多問各幾何荅曰大夫出八錢一百三十七分錢之一百四不更出一十錢一百三十七分錢之一百三十簮褭出一十四錢一百三十七分錢之八十二上造出二十一錢一百三十七分錢之一百二十三公士出四十三錢一百三十七分錢之一百九術曰置爵數各自爲㐮而返㐮之副并爲
