body:
  text: 十二乗之爲實實如法而一得從歩今有田廣一歩半三分歩之一四分歩之一五分歩之一求田一畒問從幾何荅曰一百五歩一百三十七分歩之一十五術曰下有五分以一爲六十半爲三十三分之一爲二十四分之一爲一十五五分之一爲一十二並之得一百三十七以爲法置田二百四十歩亦以一爲六十乗之爲實實如法得從歩今有田廣一歩半三分歩之一四分歩之一五分歩之一六分歩之一求田一畒問從幾何荅曰九十七歩四十九分歩之四十七術曰下有六分以一爲一百二十半爲六十三分之一爲四十四分之一爲三十五分之一爲二十四六分之一爲二十并之得二百九十四以爲法置田二百四十歩
