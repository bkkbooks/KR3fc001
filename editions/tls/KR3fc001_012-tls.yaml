body:
  text: 少各幾何而平荅曰减三分之二者一四分之三者四并以益二分之一而各平於三十六分之二十三平分臣淳風等謹按平分知諸分參差欲令齊等减彼之多增此之少故曰平分也術曰母互乗子齊其子也副并爲乎實臣淳風等謹按母互乗子副并爲平實知定此平實主限衆子所當損益知限爲平母相乗爲法母相乗爲法知亦齊其子又同其母以列數乗未并者各自爲列實亦以列數乗法此當副并列數爲平實若然則重有分故反以列數乗同齊臣淳風等謹又按問云所平之分多少不定或三或二列位無常平三知置位三重平二知置位二重凡此之例一凖平分不可預定多少故直云列數而巳以平實减列實餘約之爲所减并所减以益於少以法命平實各得其平今有七人分八錢三分錢之一問人得幾何荅曰人得一錢二十一分錢之四又有三人三分人之一分六錢三分錢之一四
