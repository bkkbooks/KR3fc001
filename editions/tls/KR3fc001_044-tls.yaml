body:
  text: 爲法少者多之始一者數之母故爲率者必等之於一據粟率五糲率三是粟五而爲一糲米三而爲一也欲化粟爲米者糲當先本是一一者謂以五約之令五而爲一也訖乃以三乗之令一而爲三如是則率至於一以五爲三矣然先除後乗或有餘分故術反之又完言之知粟五升爲糲米三升分言之知粟一斗爲糲米五分斗之三以五爲母三爲子以粟求糲米者乗其母報除也然則所求之率常爲母也臣淳風等謹按冝云所求之率常爲子所有之率常爲母今乃云所求之率常爲母知脫錯也實如法而一今有粟一斗欲爲糲米問得幾何荅曰爲糲米六升術曰以粟米糲米三之五而一臣淳風等謹按都術以所求率乗所有數以所有率爲法此術以粟求米故粟爲所有數三是米率故三爲所求率五爲粟率故五爲所有率粟率五十米率三十退位求之故唯云三五也今有粟二斗一升欲爲粺米問得幾何荅曰爲粺米一斗一升五十分升之十七術曰以粟米粺米二十七之五十而一臣淳風等謹按粺米之率二十有七故直以二十七之五十而一也今有粟四斗五升欲爲糳米問得幾何
