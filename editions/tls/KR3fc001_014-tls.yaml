body:
  text: 分錢之三問人得幾何荅曰人得二錢八分錢之一經分臣淳風等謹按經分者自合分巳下皆與諸分相齊此乃直求一人之分以人數分所分故曰經分也術曰以人數爲法錢數爲實實如法而一有分者通之母互乗子如齊其子母相乗者同其母以母通之者分母乗全內子乗散全則爲積分積分則與分子相通之故可令相從凡數相與者謂之率率知自相與通有分則可散分重疊則約也等除法實相與率也故散分者必令兩分母相乗法實也重有分者同而通之又以法分母乗實實分母乗法此謂法實具有分故令分母各乗全分內子又令分母互乗上下今有田廣七分歩之四從五分歩之三問爲田幾何荅曰三十五分歩之十二又有田廣九分歩之七從十一分歩之九問爲田幾何荅曰十一分歩之七又有田廣五分歩之四從九分歩之五問爲田幾何
