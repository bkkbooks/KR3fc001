body:
  text: 術曰下有八分以一爲八百四十半爲四百二十三分之一爲二百八十四分之一爲二百一十五分之一爲一百六十八六分之一爲一百四十七分之一爲一百二十八分之一爲一百五并之得二千二百八十三以爲法置田二百四十歩亦以一爲八百四十乗之爲實實如法得從歩今有田廣一歩半三分歩之一四分歩之一五分歩之一六分歩之一七分歩之一八分歩之一九分歩之一求田一畒問從幾何荅曰八十四歩七千一百二十九分歩之五千九百六十四術曰下有九分以一爲二千五百二十半爲一千二百六十三分之一爲八百四十四分之一爲六百三十五分之一爲五百四六分之一爲四百二十七分之一爲三百六十八分之一爲三百一十五九分之一爲二百八十并之得七千一百二十九
