body:
  text: 率以七乗之其平地者二百六十四而一依垣者一百三十二而一依隅者六十六而一也程粟一斛積二尺七寸二尺七寸者謂方一尺深二尺七寸凡積二千七百寸其米一斛積一尺六寸五分寸之一謂積一千六百二十寸其菽荅麻麥一斛皆二尺四寸十分寸之三謂積二千四百三十寸此爲以精麄爲率而不等其槩也粟率五米率三故米一斛於粟一斛五分之三菽荅麻麥亦如本率云故謂此三量器爲槩而皆不合於今斛當今大司農斛圎徑一尺三寸五分五氂正深一尺於徽術爲積一千四百四十一寸排成餘分又有十分寸之三王莽銅斛於今尺爲深九寸五分五釐徑一尺三寸六分八釐七毫以徽術計之於今斛爲容九斗七升四合有竒周官考工記氏爲量深一尺內方一尺而圎外其實一黼於徽術此圎積一千五百七十六寸左氏傳曰齊舊四量豆區釜鐘四升曰豆各登其四以登於釜釜十則鐘鐘六斛四斗釜六斗四升方一尺深一尺其積一千寸若此方積容六斗四升則通外圎積成旁容十斗四合一龠五分之三也以數相乗之則斛之制方一尺而圎其外庣旁一釐七毫羃一百五十六寸四分寸之一深一尺積一千五百六十二寸半容十斗王莽銅斛與漢書律曆志所論斛同今有穿地袤一丈六尺深一丈上廣六尺爲垣積五百七十六尺問穿地下廣幾何
