body:
  text: 定實乃開之訖令如母而一臣淳風等謹桉分母不可開者本一母也又以母乗之乃合二母旣開之後亦一母存焉故令一母而一得全靣也又按此術開方者求方羃之靣也惜一筭者假借一筭空有列位之名而無除積之實方隅得靣是故借筭列之於下歩之超一等者方十自乗其積有百方百自乗其積有萬故超位至百而言十至萬而言百議所得以一乗所借筭爲法而以除者先得黃甲之靣以方爲積者兩相乗故開方除之還令兩靣上下相命是自乗而除之除巳倍法爲定法者實積未盡當復更除故豫張兩靣朱羃袤以待復除故曰定法其復除折法而下者欲除朱羃本當副置所得成方倍之爲定法以折議乗之而以除如初是當復歩之而止乃得相命故使就上折之而下復置借筭歩之如初以復議一乗之所得副以加定法以定法除者欲除朱羃之角黃乙之羃以所得副從定法者再以黃乙之羃加定法是則張兩青羃之袤故如前開之即合所問今有積一千五百一十八歩四分歩之三問爲圎周幾何荅曰一百三十五歩於徽術當周一百三十八歩一十分歩之一臣淳風等謹按此依宻率爲周一百三十八歩五十分歩之九又有積三百歩問爲圎周幾何荅曰六十歩於徽術當周六十一歩五十分歩之十九臣
