body:
  text: 尺問得錢幾何荅曰八十四錢八分錢之三術曰以一匹尺數爲法今有布尺數乗價錢爲實實如法得錢數按此術亦今有之義以一匹尺數爲所有率價錢爲所求率今有布爲所有數今有之即得今有素一匹一丈價直六百二十五今有錢五百問得素幾何荅曰得素一匹術曰以價直爲法以一匹一丈尺數乗今有錢數爲實實如法得素數按此術亦今有之義以價錢爲所有率五丈尺數爲所求率今有錢爲所有數今有之即得今有與人絲一十四斤約得縑一十斤今與人縑四十五斤八兩問得縑幾何荅曰三十二斤八兩術曰以一十四斤兩數爲法以一十斤乗今有絲兩數爲實實如法得縑數此術亦今有之義以一十四斤兩數爲所有率一十斤爲所求率今有絲爲所有數今有之即得今有絲一斤耗七兩今有絲二十三斤五兩問
