body:
  text: 今有粟二斗三升欲爲糲飯問得幾何荅曰爲糲飯三斗四升半術曰以粟米糲飯三之二而一臣淳風等謹按糲飯之率七十有五粟求糲飯合以此數乗之今以等數二十有五約其二率所求之率得三所有之率得二故以三乗二除今有粟三斗六升欲爲粺飯問得幾何荅曰爲粺飯三斗八升二十五分升之二十二術曰以粟求粺飯二十七之二十五而一臣淳風等謹按此術與大䵂多同今有粟八斗六升欲爲糳飯問得幾何荅曰爲糳飯八斗二升二十五分升之一十四術曰以粟求糳飯二十四之二十五而一臣淳風等謹按糳飯率四十八此亦半二率而乗除今有粟九斗八升欲爲御飯問得幾何荅曰爲御飯八斗二升二十五分升之八
