body:
  text: 一十三分斛之一千二百一十臣淳風等謹依宻率爲粟二千八百二十八斛九十九分斛之二十八今有委菽依垣下周三丈髙七尺問積及爲菽各幾何荅曰積三百五十尺依徽術當積三百三十四尺四百七十一分尺之一百八十六也臣淳風等謹依宻率爲積三百三十四尺十一分尺之一爲菽一百四十四斛二百四十三分斛之八依徽術當菽一百三十七斛一萬二千七百一十七分斛之七千七百七十一臣淳風等謹依宻率爲菽一百三十七斛八百九十一分斛之四百三十三今有委米依垣內角下周八尺髙五尺問積及爲米幾何荅曰積三十五尺九分尺之五於徽術當積三十三尺四百七十一分尺之四百五十七臣淳風等謹依宻率當積三十三尺三十三分尺之三十一
