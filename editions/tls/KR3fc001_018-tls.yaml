body:
  text: 入於經分矣然則分子相乗爲實者猶齊其金也母相乗爲法者猶齊其人也同其母爲二十馬無事於同但欲求齊而已又馬五匹直金三斤完全之率分而言之則爲一匹直金五分斤之三七人賣四馬一人賣七分馬之四分子與人交互相生所從言之異而計數則三術同歸也今有田廣三歩三分歩之一從五歩五分歩之二問爲田幾何荅曰十八歩又有田廣七歩四分歩之三從十五歩九分歩之五問爲田幾何
