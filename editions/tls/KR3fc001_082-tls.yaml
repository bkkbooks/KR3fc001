body:
  text: 次日織三寸三十一分寸之七次日織六寸三十一分寸之十四次日織一尺二寸三十一分寸之二十八次日織二尺五寸三十一分寸之二十五術曰置一二四八十六爲列㐮副并爲法以五尺乗未并者各自爲實實如法得一尺今有北鄉筭八千七百五十八西鄉筭七千二百三十六南鄉筭八千三百五十六凡三鄉發徭三百七十八人欲以筭數多少㐮出之問各幾何荅曰北鄉遣一百三十五人一萬二千一百七十五分人之一萬一千六百三十七西鄉遣一百一十二人一萬二千一
