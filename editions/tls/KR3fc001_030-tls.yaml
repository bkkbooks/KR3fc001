body:
  text: 七也圎率猶爲微少按弧田圖合方中容圎圎中容方內方合外方之半然則圎羃一百五十七其中容方羃二百也又合徑二尺與周六尺二寸八分相約周得一百五十七徑得五十則其相與之率也周率猶爲㣲少也晉武庫中漢時王莽作銅斛其銘曰律嘉量斛內方尺而圎其外庣旁九氂五毫羃一百六十二寸深一尺積一千六百二十寸容十斗以此術求之得羃一百六十一寸有竒其數相近矣此術㣲少而斛差羃六百二十五分寸之一百五以十二弧之羃以率消息當取此份寸之三十六以增於一百九十二弧之羃以爲圎羃三百一十四寸二十五分寸之四置徑自乗之方羃四百寸令與圎羃通相約圎羃三千九百二十七方羃得五千是爲率方羃五千中容圎羃三千九百二十七圎羃三千九百二十七中容方羃二千五百也以半徑一尺除圎羃三百一十四寸二十五分寸之四倍所得六尺二寸八分二十五分寸之八即周數也全徑二尺與周數通相約徑得一千二百五十周得三千九百二十七即其相與之率若此者盖盡其織㣲矣舉而用之上法爲約耳當求一千五百三十六弧之一靣得三千七十二弧之羃而栽其微分數亦冝然重其驗耳臣淳風等謹按舊術求圎皆以周三徑一爲率若用之求圎周之數則周少徑多用之求其六弧之田乃與此率合會耳何則假令六弧之田弧間各一尺爲靣自然從角至角其徑一尺可知此則周六徑二與周三徑一巳合恐此猶以難曉今更引物爲喻設令刻物作圭形者六枚枚別三靣皆長一尺攢此六物悉使銳頭向裹則成六弧之周角徑亦皆一尺更從弧角外畔圍繞爲規則六弧之徑盡達規矣當
