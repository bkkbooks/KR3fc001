body:
  text: 爲率譬之異物各有一定之率也今有田一畒収粟六升太半升今有田一頃二十六畒一百五十九歩問収粟幾何荅曰八斛四斗四升一十二分升之五術曰以畒二百四十歩爲法以六升太半升乗今有田積歩爲實實如法得粟數按此術亦今有之義以一畒歩數爲所有率六升太半升爲所求率今有田積歩爲所有數而今有之即得今有取保一歲價錢二千五百今先取一千二百問當作日幾何荅曰一百六十九日二十五分日之二十三術曰以價錢爲法以一歲三百五十四日乗先取錢數爲實實如法得日數按此術亦今有之義以價爲所有率一歲日數爲所求率取錢爲所有數而今有之即得今有貸人千錢月息三十今有貸人七百五十錢九日歸之問息幾何
  hash: sha256:7942ae0054e804069b32afaf57b03a1be85e0b5340c6ea8e6f05e293c91fff2f
