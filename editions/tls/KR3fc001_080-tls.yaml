body:
  text: 今有甲持錢五百六十乙持錢三百五十丙持錢一百八十凡三人俱出關關稅百錢欲以錢數多少㐮出之問各幾何荅曰甲出五十一錢一百九分錢之四十一乙出三十二錢一百九分錢之一十二丙出一十六錢一百九分錢之五十六術曰各置錢數爲列㐮副并爲法以百錢乗未并者各自爲實實如法得一錢臣淳風等謹按此術甲乙丙持錢數以爲列㐮副并爲所有率未并者各爲所求率百錢爲所有數而今有之即得今有女子善織日自倍五日織五尺問日織幾何荅曰初日織一寸三十一分寸之十九
