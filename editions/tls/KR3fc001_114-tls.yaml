body:
  text: 分歩之一六分歩之一七分歩之一八分歩之一九分歩之一十分歩之一十一分歩之一求田一畒問從幾何荅曰七十九歩八萬三千七百一十一分歩之三萬九千六百三十一術曰下有一十一分以一爲二萬七千七百二十半爲一萬三千八百六十三分之一爲九千二百四十四分之一爲六千九百三十五分之一爲五千五百四十四六分之一爲四千六百二十七分之一爲三千九百六十八分之一爲三千四百六十五九分之一爲三千八十一十分之一爲二千七百七十二一十一分之一爲二千五百二十並之得八萬三千七百一十一以爲法置田二百四十歩亦以一爲二萬七千七百二十乗之爲實實如法得從歩今有田廣一歩半三分歩之一四分歩之一五分歩之一六分歩之一七分歩之一八分歩之
