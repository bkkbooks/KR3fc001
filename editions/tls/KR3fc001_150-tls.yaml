body:
  text: 術曰上下周相乗又各自乗并之以髙乗之三十六而一此術周三徑一之義合以三除上下周各爲上下徑以相乗又各自乗并以髙乗之三而一爲方亭之積假令三約上下周俱不盡還通之即各爲上下徑令上下徑分母相乗又各自乗并以髙乗之爲三方亭之積分此合分母三相乗得九爲法除之又三而一得方亭之積亦猶方羃中求圎羃乃令圎率三乗之方率四而一得圎亭之積前求方亭之積乃以三而一求圎亭之積亦各三乗之二母旣同故相凖折惟以方羃四乗分母九得三十六而連除之於徽術當上下周相乗又各自乗并以髙乗之又二十五乗之九百四十二而一此方亭四角圎殺比於方亭二百分之一百五十七爲術之意先作方亭三而一則此據上下徑爲之者當又以一百五十七乗之六百而一也今據周爲之若於圎堢壔又以二十五乗之三百一十四而一則先得三圎亭矣故以三百一十四爲九百四十二而一并除之臣淳風等謹按依宻率以七乗之二百六十四而一今有方錐下方二丈七尺髙二丈九尺問積幾何荅曰七千四十七尺術曰下方自乗以髙乗之三而一按此術假令方錐下方二尺髙一尺即四陽馬如術爲之用十二陽馬成三方錐故三而一得陽馬也
