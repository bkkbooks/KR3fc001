body:
  text: 術曰以一斤價數爲法以一斤乗今有錢數爲實實如法得絲數按此術今有之義以一斤價爲所有率一斤爲所求率今有錢爲所有數而今有之即得今有絲一斤價直三百四十五今有絲七兩一十二銖問得錢幾何荅曰一百六十一錢三十二分錢之二十三術曰以一斤銖數爲法以一斤價數乗七兩一十二銖爲實實如法得錢數按此術亦今有之義以絲一斤數爲所有率價錢爲所求率今有絲爲所有數而今有之即得今有縑一丈價直一百二十八今有縑一匹九尺五寸問得錢幾何荅曰六百三十三錢五分錢之三術曰以一丈寸數爲法以價錢數乗今有縑寸數爲實實如法得錢數臣淳風等謹按此術亦今有之義以縑一丈寸數爲所有率價錢爲所求率今有縑寸數爲所有數而今有之即得今有布一匹價直一百二十五今有布二丈七
