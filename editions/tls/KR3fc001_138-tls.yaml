body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋商功以御功程积實今有穿地積一萬尺問爲堅壤各幾何答曰爲堅七千五百尺爲壤一萬二千五百尺術曰穿地四爲壤五壤謂息土爲堅三堅爲築土爲墟四墟謂穿坑此皆其常率以穿地求壤五之求堅三之皆四而一今有術也以壤求穿四之求堅三之皆五而一以堅求穿四之求壤五之皆三而一臣淳風等謹按此術竝今有之義也重張穿地積一萬尺爲所有數堅率三壤率五各爲所求率墟率四爲所有率而今有之即得城垣隄溝壍渠皆同術术曰并上下廣而半之損廣補狹以髙若深乗之又以袤乗之即積尺按此術并上下廣而半之者以盈補虚得中平之廣以髙若深乗之堅率三壤率五各爲所求率墟四爲所有率而今有
