body:
  text: 荅日一匹二百四十四錢一百二十九分錢之一百二十四今有出錢一萬三千六百七十買絲一石二鈞一十七斤欲石率之問石幾何荅曰一石八千三百二十六錢一百九十七分錢之百七十八經率此術猶經分臣淳風等謹按今有之義錢爲所求率物爲所有數故以乗錢又以分母乗之爲實實如法而一有分者通之所買通分內子爲所有率故以爲法得錢數不盡而命分者因法爲母實餘爲子實見不滿故以命之術曰以所求率乗錢數爲實以所買率爲法實如法得一今有出錢五百七十六買竹七十八箇欲其大小率之問各幾何荅曰其四十八箇箇七錢其三十箇箇八錢今有出錢一千一百二十買絲一石二鈞十八今欲其貴賤斤率之問各幾何
