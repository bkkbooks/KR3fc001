body:
  text: 九臣淳風等謹按宻率爲周五丈五尺一百分尺之二十七術曰置米積尺此積猶圎堢壔之積以十二乗之令髙而一所得開方除之即周於徽術當置米積尺以三百一十四乗之爲實二十五乗囷髙爲法所得開方除之即周也此亦據見羃以求周失之於微少也晉武庫中有漢時王莽所作銅斛其篆書字題斛旁云律嘉量斛方一尺而圎其外庣旁九釐五毫羃一百六十二寸深一尺積一千六百二十寸容十斗及斛底云律嘉量斗方尺而圜其庣旁九釐五毫羃一尺六寸二分深一尺積一百六十二寸容一斗合龠皆有文字升居斛旁合龠在斛耳上後有讚文與今律曆志同亦魏晉所常用今粗疏王莽銅斛文字尺寸分數然不盡得升合勺之文字按此術本周自相乗以髙乗之十二而一得此積今還元置此積以十二乗之令髙而一即復本周自乗之數凡物自乗開方除之復其本周自乗之數故開方除之即得也臣淳風等謹依宻率以八十乗之爲實七乗囷髙爲法實如法而一方除之即周也九章筭經卷第五終
