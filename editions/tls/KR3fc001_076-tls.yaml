body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋㐮分以御貴賤禀稅㐮分㐮分差也術曰各置列㐮列表相與率也重疊則可約副并爲法以所分乗未并者各自爲實法集而㐮別數本一也今以所分乗上別以下集除之一乗一除適足相消故所分猶存且各應率而別也於今有術列衰各爲所求率副并爲所有率所分爲所有數又以經分言之假令甲家三人乙家二人丙家一人并六人共分十二爲人得二也欲復作逐家者則當列置人數以一人所得乗之今此術先乗而後除也實如法而一不滿法者以法命之今有大夫不更簮褭上造公士凡五人共獵得五鹿欲以爵次分之問各得幾何荅曰大夫得一鹿三分鹿之二不更得一鹿三分鹿之一簮褭得一鹿
