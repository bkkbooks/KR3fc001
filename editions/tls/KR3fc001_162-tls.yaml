body:
  text: 周一丈四尺外周二丈四尺廣五尺深一丈問積幾何荅曰一千八百八十三尺三寸少半寸今有盤池上廣六丈袤八丈下廣四丈袤六丈深二丈問積幾何荅曰七萬六百六十六尺太半尺負土往來七十歩其二十歩上下棚除棚除二當平道五踟蹰之間十加一載輸之間三十歩定一返一百四十歩土籠積一尺六寸秋程人功行五十九里半問人到積尺用徒各幾何荅曰人到二百四尺用徒三百四十六人一百五十三分人之六十二術曰以一籠積尺乗程行歩數爲實往來上下棚除二當平道五棚閣除邪道有上下之難故使二當
  hash: sha256:4fd0546c9d12b82a48d75a8452715c127ddbbf17376f9cd2a04664d148fdeea0
