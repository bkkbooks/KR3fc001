body:
  text: 荅曰一百二十歩九分歩之五又有田廣十八歩七分歩之五從二十三歩十一分歩之六問爲田幾何荅曰一畒二百歩十一分歩之七大廣田臣淳風等謹按大廣田知初術直有全歩而無餘分次術空有餘分而無全歩此術先見全歩復有餘分可以廣兼三術故曰大廣術曰分母各乗其全分子從之分母各乗其全分子從之者通全歩內分子如此則母子皆爲實矣相乗爲實分母相乗爲法猶乗分也實如法而一今爲術廣從俱有分當各自通其分命母入者還湏出之故令分母相乗爲法而連除之今有圭田廣十二歩正從二十一歩問爲田幾何荅曰一百二十六歩又有圭田廣五歩二分歩之一從八歩三分歩之二問爲田幾何荅曰二十三歩六分歩之五術曰半廣以乗正從半廣知以盈補虛爲直田也亦可半正從以乗廣按平廣乗從以取中平之數故廣從相乗爲積歩畒法除之即得也
