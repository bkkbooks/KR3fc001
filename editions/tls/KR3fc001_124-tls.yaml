body:
  text: 淳風等謹依宻率爲周六十一歩一百分歩之四十一開圎術曰置積歩數以十二乗之以開方除之即得周此術以周三徑一爲率與舊圎田術相返覆也於徽術以三百一十四乗積如二十五而一所得開方除之即周也開方除之即徑是爲據見羃以求周猶失之於徽少其以二百乗積一百五十七而一開方除之即徑猶失這於微多臣淳風等謹按此注於徽術求周之法其中不用開方除之即徑六字今本有者衍賸也依宻率八十八乗之七而一按周三徑一之率假令周六徑二半周半徑相乗得羃三周六自乗得三十六俱以等數除羃得一周之數十二也其積本周自乗合以一乗之十二而一得積三也術爲一乗不長故以十二而一得此積今還元置此積三以十二乗之者復其本周自乗之數凡物自乗開方除之復其本數故開方除之即周今有積一百八十六萬八百六十七尺此尺謂立方之尺也凡物有髙深而言積者曰立方問爲立方幾何荅曰一百二十三尺又有積一千九百五十三尺八分尺之一問爲立方幾何荅曰一十二尺半
  hash: sha256:4b063c8bc78a9f8ddf904087da37c63c7e4672e67acfde58a96618eb536ea22d
