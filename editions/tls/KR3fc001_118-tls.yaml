body:
  text: 十四分之一爲六千九百三十五分之一爲五千五百四十四六分之一爲四千六百二十七分之一爲三千九百六十八分之一爲三千四百六十五九分之一爲三千八十十分之一爲二千七百七十二十一分之一爲二千五百二十十二分之一爲二千三百一十并之得八萬六千二十一以爲法置田二百四十歩亦以一爲二萬七千七百二十乗之以爲實實如法得從歩其術亦得知不繁也今有積五萬五千二百二十五歩問爲方幾何荅曰二百三十五歩又有積二萬五千二百八十一歩問爲方幾何荅曰一百五十九歩又有積七萬一千八百二十四歩問爲方幾何荅曰二百六十八歩又有積五十六萬四千七百五十二歩四分歩之一問爲方幾何荅曰七百五十一歩半又有積三十九億七千二百一十五萬六百二十五歩問爲方幾何荅曰六萬三千二十五歩開方求方羃之一靣也
