body:
  text: 術曰以粟求御飯二十一之二十五而一臣淳風等謹按此術半率亦與糳飯多同今有粟三斗少半升欲爲菽問得幾何荅曰爲菽二斗七升一十分升之三今有粟四斗一升太半升欲爲荅問得幾何荅曰爲荅三斗七升半今有粟五斗太半升欲爲麻問得幾何荅曰爲麻四斗五升五分升之三今有粟一十斗八升五分升之二欲爲麥問得幾何荅曰爲麥九斗七升二十五分升之一十四術曰以粟求菽荅麻麥皆九之十而一風等謹按四術率並四十五皆是爲栗所求俱合以此率乗其本粟術欲從省先以等數五約之所求之率得九所有之率得十故九乗十除義由於此今有粟七斗五升七分升之四欲爲稻問得幾何荅曰爲稻九斗三十五分升之二十
