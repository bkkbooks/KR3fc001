body:
  text: 一九分歩之一十分歩之一十一分歩之一十二分歩之求田一畒問從幾何荅曰七十七歩八萬六千二十一分歩之二萬九千一百八十三術曰下有一十二分以一爲八萬三千一百六十半爲四萬一千五百八十三分之一爲二萬七千七百二十四分之一爲二萬七百九十五分之一爲一萬六千六百三十二六分之一爲一萬三千八百六十七分之一爲一萬一千八百八十八分之一爲一萬三百九十五九分之一爲九千二百四十一十分之一爲八千三百一十六十一分之一爲七千五百六十十二分之一爲六千九百三十并之得二十五萬八千六十三以爲法置田二百四十歩亦以一爲八萬三千一百六十乗之爲實實如法得從歩臣淳風等謹凡爲術之意約省爲善冝云下有一十二分之一爲二萬七千七百二十半爲一萬三千八百六十三分之一爲九千二百四
