body:
  text: 荅曰九十三尺少半尺術曰廣袤相乗以髙乗之三而一按此術陽馬之形方錐一隅也今謂四柱屋隅爲陽馬假令廣袤各一尺髙一尺相乗之得立方積一尺邪解立方得兩壍堵邪解壍堵其一爲陽馬一爲鼈腝陽馬居二鼈腝居一不易之率也合兩鼈腝成一陽馬合三陽馬而成一立方故三而一驗之以棊其形露矣悉割陽馬凡爲六鼈腝觀其割分則體勢互通蓋易了也其棊或脩短或廣狹立方不等者亦割分以爲六鼈腝其形不悉相似然見數同積實均也鼈腝殊形陽馬異體然陽馬異體則不純合不純合則難爲之矣何則按邪解方棊以爲壍堵者必當以半爲分邪解壍堵以爲陽馬者亦必當以半爲分一從一横耳設以陽馬爲分内鼈腝爲分外棊雖或隨脩短廣狹猶有此分常率知殊形異體亦同也者以此而巳其使鼈腝廣袤各髙二尺用壍堵鼈腝之棊各二皆用赤棊又使陽馬之廣袤髙各二尺用立方之棊一壍堵陽馬之棊各二皆用黑棊棊之赤黑接爲壍堵廣袤髙各二尺於是中效其廣又中分其髙令赤黑壍堵各自適當一方髙二尺方一尺每二分鼈腝則一陽馬也其餘兩端各積本體合成一方焉是爲别種而方者率居三通其體而方者率居一雖方隨棊攺而固有常然之勢也按餘數具而可知者有一二分之别即一二之爲率定矣其於理也豈虚矣若爲數而窮之置餘廣袤髙之數各半之則四分之三又可知也半之彌少其餘彌細至細曰微微則無形由是言之安取餘哉數而求窮之者謂以精推不用籌筭鼈腝之物不同器用陽馬之形或隨
