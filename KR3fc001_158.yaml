body:
  text: 與鱉腝連也并三廣以髙袤乘六而一皆其積也今此羡除之廣即塹堵之袤也按此本是三廣不等即與鱉腝連者別而言之中央塹堵廣六尺髙三尺袤七尺末廣之兩旁各一小鱉腝皆與塹堵等令小鱉腝居裏大鱉腝居表則大鱉腝皆出隨方錐下廣二尺袤六尺髙七尺分取其半則為袤三尺以髙廣乘之三而一即半錐之積也邪解半錐得此兩大鱉腝求其積亦當六而一合於常率矣按陽馬之棊兩邪棊底方當其方也不問旁角而割之相半可知也推此上連無成不方故方錐與陽馬同實角而割之者相半之勢此大小鱉腝可知更相表裏但體有背正也今有芻甍下廣三丈袤四丈上袤二丈無廣髙一丈問積幾何答曰五千尺術曰倍下袤上袤從之以廣乘之又以髙乘之六而一推明義理者舊說云凡積芻甍有上下廣曰童甍謂其屋蓋之茨也是故甍之下廣袤與童之上廣袤等正斬方亭兩邊合之即芻甍之形也假令下廣二尺袤三尺上袤一尺無廣髙一尺其用棊也中央塹堵二兩端陽馬各二倍下袤上袤從之為七尺以髙廣乘之得羃十四尺陽馬之羃各居二塹堵之羃各居三以髙乘之得積十四尺其於本棊也皆一而為六故六而一即得亦可令上下袤差乘廣以髙乘之三而一即四陽馬也下廣乘之上袤而半之髙乘之即二塹堵并之以為甍積也
