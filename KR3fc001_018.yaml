body:
  text: 入於經分矣然則分子相乘為實者猶齊其金也母相乘為法者猶齊其人也同其母為二十馬無事於同但欲求齊而已又馬五匹直金三斤完全之率分而言之則為一匹直金五分斤之三七人賣四馬一人賣七分馬之四分子與人交互相生所從言之異而計數則三術同歸也今有田廣三步三分步之一從五步五分步之二問為田幾何答曰十八步又有田廣七步四分步之三從十五步九分步之五問為田幾何
