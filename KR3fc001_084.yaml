body:
  text: 百七十五分人之四千四南鄉遣一百二十九人一萬二千一百七十五分人之八千七百九術曰各置筭數爲列㐮臣淳風等謹按三郷筭數約可半者爲列㐮副并爲法以所發傜人數乗未并者各自爲實實如法得一人按此術今有之義也今有禀粟大夫不更簮褭上造公士凡五人一十五斗今有大夫一人後來亦當禀五斗倉無粟欲以㐮出之問各幾何荅曰大夫出一斗四分斗之一不更出一斗簮褭出四分斗之三上造出四分斗之二公士出四分斗之一術曰各置所禀粟斛斗數爵次均之以爲列㐮副并而加後來大夫亦五斗得二十以爲法以五斗乗未并者各自爲實實如
  hash: sha256:c9214a672a284ee8c7ae246d5a4f662b021df8334081c81d2606ba65df7db2c0
