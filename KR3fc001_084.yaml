body:
  text: 百七十五分人之四千四南鄉遣一百二十九人一萬二千一百七十五分人之八千七百九術曰各置算數為列襄臣淳風等謹按三鄉算數約可半者為列襄副并為法以所發徭人數乘未并者各自為實實如法得一人按此術今有之義也今有禀粟大夫不更簮裊上造公士凡五人一十五斗今有大夫一人後來亦當禀五斗倉無粟欲以襄出之問各幾何答曰大夫出一斗四分斗之一不更出一斗簮裊出四分斗之三上造出四分斗之二公士出四分斗之一術曰各置所禀粟斛斗數爵次均之以為列襄副并而加後來大夫亦五斗得二十以為法以五斗乘未并者各自為實實如
  hash: sha256:b3328b6c6fc332d136efa638a9f1731d6c0368190873c538f7f5ddeef1cf21fd
