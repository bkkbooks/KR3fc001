body:
  text: 答曰為糳米二斗一升五分升之三術曰以粟米糳米十二之二十五而一臣淳風等謹按稗米之率二十有四以為率太繁故因而半之故半所求之率以乘所有之數所求之率既减半所有之率亦减半是故十二乘之二十五而一也今有粟七斗九升欲為御米問得幾何答曰為御米三斗三升五十分升之九術曰以粟求御米二十一之五十而一今有粟一斗欲為小䵂問得幾何答曰為小䵂二升一十分升之七術曰以粟米小䵂二十七之百而一臣淳風等謹按小䵂之率十三有半半者二為母以二通之得二十七為所求率又以母二通其粟率得一百為所有率凡本率有分者須即乘除也他皆放此今有粟九斗八升欲為大䵂問得幾何答曰為大䵂一十斗五升二十五分升之二十一術曰以粟求大䵂二十七之二十五而一臣淳風等謹按大䵂之率五十有四其可半故二十七之亦如粟求糳米半其二率
  hash: sha256:958043efcd377a4d8632302b435de0f914f2aaff71be0ef7a8eab9faa69a612e
