body:
  text: 四術曰以粟求稻六之五而一臣淳風等謹按稻率六十亦约二率而乗除今有粟七斗八升欲爲豉問得幾何荅曰爲豉九斗八升二十五分升之七術曰以粟求鼓六十三之五十而一今有粟五斗五升欲爲飱問得幾何荅曰爲飱九斗升術曰以粟求飱九之五而一臣淳風等謹按飱率九十退位與求稻多同今有粟四斗欲爲熟菽問幾何荅曰爲熟菽八斗二升五分升之四術曰以粟求熟菽二百七之百而一臣淳風等謹按熟菽之率一百三半半者其母二故以母二通之所求之率旣被二乗所有之率隨而俱長故以二百七之百而一今有粟二斗欲爲糵問得幾何荅曰爲糵七斗
  hash: sha256:f55510c22a84b5fb0e342767ca998de160d5853c4334fd643614fd0308943918
