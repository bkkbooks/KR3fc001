body:
  text: 五分忽之一謂之小句弧之半靣又謂之小股為之求小弦其羃一百七十一億一千二十七萬八千八百一十三忽餘分棄之開方除之得小弦一寸三分八毫六忽餘分棄之即四十八弧之一靣以半徑一尺乘之又以二十四乘之得羃三萬一千三百九十三億四千四百萬忽以百億除之得羃三百一十三寸六百二十五分寸之五百八十四即九十六弧之羃也割四十八弧以為九十六弧術曰亦令半徑為弦半靣為句為之求股置次上弦羃四而一得四十二億七千七百五十六萬九千七百三忽餘分棄之則句羃也以減弦羃其餘開方除之得殷九寸九分七氂八毫五秒八忽十分忽之九以减半徑餘二氂一毫四秒一忽十分忽之一謂之小句弧之半靣又謂之小股為之求小弦其羃四十二億八千二百一十五萬四千一十二忽餘分棄之開方除之得小弦六分五氂四毫三秒八忽餘分棄之即九十六弧之一靣以半徑一尺乘之又以四十八乘之得羃三萬一千四百一十億二千四百萬忽以百億除之得羃三百一十四寸六百二十五分寸之六十四即一百九十二弧之羃也以九十六弧之羃减之餘六百二十五分寸之一百五謂之差羃倍之為分寸之二百一十即九十六弧之外弧田九十六所謂以弦乘矢之凡羃也加此羃於九十六弧之羃得三百一十四寸六百二十五分寸之一百六十九則出於圎之表矣故還就一百九十二弧之全羃三百一十四寸以為圎羃之定率而棄其餘分以半徑一尺除圎羃倍所得六尺二寸八分即周數令徑自乘為方羃四百寸與圎羃相折圎羃得一百五十七為率方羃得二百為率方羃二百其中容圎羃一百五十
