body:
  text: 五也置定往來步數十加一及載輸之間三十步以為法除之所得即一人所到尺按此術棚閣除邢道有上下之難故使二當五置定往來步數十加一及載輸之間三十步是為往來一返凡用一百四十步於今有術為所有行率籠積一尺六寸為所求到土率程行五十九里半為所有數而今有之即人到尺數以所到積尺即用徒人數者此一人之積除其衆積尺故得用徒人數為術又可令往來一返所用之步約程行為返數乘籠積為一人所到以此術與今有術相反覆則乘除之或先後意各有所在而同歸耳以所到約積尺即用徒人數今有冥谷上廣二丈袤七丈下廣八尺袤四丈深六丈五尺問積幾何答曰五萬二千尺載土往來二百步載輸之間一里程行五十八里六人共車車載三十四尺七寸問人到積尺及用徒各幾何答曰人到二百一尺五十分尺之十三用徒二百五十八人一萬六十三分人之三千七百四十六
