body:
  text: 之返襄人數不同則分數不齊當令母互乘子母互乘子則動者為不動者襄也亦可先同其母各以分母約其子為返襄副并為法以所分乘未并者各自為實實如法而一術曰列置襄而令相乘動者為不動者衰今有大夫不更簮裊上造公士凡五人共出百錢欲令髙爵出少以次漸多問各幾何答曰大夫出八錢一百三十七分錢之一百四不更出一十錢一百三十七分錢之一百三十簮裊出一十四錢一百三十七分錢之八十二上造出二十一錢一百三十七分錢之一百二十三公士出四十三錢一百三十七分錢之一百九術曰置爵數各自為襄而返襄之副并為
