body:
  text: 術曰上下周相乘又各自乘并之以髙乘之三十六而一此術周三徑一之義合以三除上下周各為上下徑以相乘又各自乘并以髙乘之三而一為方亭之積假令三約上下周俱不盡還通之即各為上下徑令上下徑分母相乘又各自乘并以髙乘之為三方亭之積分此合分母三相乘得九為法除之又三而一得方亭之積亦猶方羃中求圎羃乃令圎率三乘之方率四而一得圎亭之積前求方亭之積乃以三而一求圎亭之積亦各三乘之二母既同故相凖折惟以方羃四乘分母九得三十六而連除之於徽術當上下周相乘又各自乘并以髙乘之又二十五乘之九百四十二而一此方亭四角圎殺比於方亭二百分之一百五十七為術之意先作方亭三而一則此據上下徑為之者當又以一百五十七乘之六百而一也今據周為之若於圎堢壔又以二十五乘之三百一十四而一則先得三圎亭矣故以三百一十四為九百四十二而一并除之臣淳風等謹按依密率以七乘之二百六十四而一今有方錐下方二丈七尺髙二丈九尺問積幾何答曰七千四十七尺術曰下方自乘以髙乘之三而一按此術假令方錐下方二尺髙一尺即四陽馬如術為之用十二陽馬成三方錐故三而一得陽馬也
