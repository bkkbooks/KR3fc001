body:
  text: 答曰三尺五分尺之三術曰置垣積尺四之為實實穿地四為堅三垣堅也以堅求穿地當四之三而一也以深袤相乘為深袤之立實也又以三之為法以深袤乘之立實除垣積則坑廣又三之者與堅率并除之所得倍之坑有兩廣先并而半之即為廣狹之中平令先得其中平故又倍之知兩廣全也減上廣餘即下廣按此術穿地四為堅三垣即堅也今以堅求穿地當四乘之三而一深袤相乘者為深袤立羃以深袤立羃除積即坑廣又三之為法與堅率并除所得倍之者為坑有兩廣先并而半之為中平之廣今此得中平之廣故倍之還為兩廣并故减上廣餘即下廣也今有倉廣三丈袤四丈五尺容粟一萬斛問髙幾何答曰二丈術曰置粟一萬斛積尺為實廣袤相乘為法實如法而一得髙尺以廣袤之羃除積故得髙按此術本以廣袤相乘以髙乘之得此積今還元置此廣袤相乘為法除之故得髙也今有圎囷圎囷廪也亦云圎囤也髙一丈三尺三寸少半寸容米二千斛問周幾何答曰五丈四尺於徽術當周五丈五尺二寸二十分寸之
