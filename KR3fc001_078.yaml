body:
  text: 上造得三分鹿之二公士得三分鹿之一術曰列置爵數各自為衰爵數者謂大夫五不更四簮裊三上造二公士一也墨子號令篇以爵級為賜然則載國之初有此名也今有術列襄各為所求率副并為所有率今有鹿數為所有數而今有之即得副并為法以五鹿乘未并者各自為實實如法得一鹿今有牛馬羊食人苗苗主責之粟五斗羊主曰我羊食半馬馬主曰我馬食半牛今欲襄償之問各出幾何答曰牛主出二斗八升七分升之四馬主出一斗四升七分升之二羊主出七升七分升之一術曰置牛四馬二羊一各自為列襄副并為法以五斗乘未并者各自為實實如法得一斗臣淳風等謹按此術問意羊食半馬馬食半牛是謂四羊當一牛二羊當一馬今術置羊一馬二牛四者通其率以為列襄
  hash: sha256:3c50fccf5743d27a6fa905e1709f98131d3b679f6ecf054cce70c30c07308689
