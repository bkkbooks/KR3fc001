body:
  text: 一九分步之一十分步之一十一分步之一十二分步之求田一畒問從幾何答曰七十七步八萬六千二十一分步之二萬九千一百八十三術曰下有一十二分以一為八萬三千一百六十半為四萬一千五百八十三分之一為二萬七千七百二十四分之一為二萬七百九十五分之一為一萬六千六百三十二六分之一為一萬三千八百六十七分之一為一萬一千八百八十八分之一為一萬三百九十五九分之一為九千二百四十一十分之一為八千三百一十六十一分之一為七千五百六十十二分之一為六千九百三十并之得二十五萬八千六十三以為法置田二百四十步亦以一為八萬三千一百六十乘之為實實如法得從步臣淳風等謹凡為術之意約省為善冝云下有一十二分之一為二萬七千七百二十半為一萬三千八百六十三分之一為九千二百四
  hash: sha256:ecdafb87131b8b0094fd0c06f9f8e4690cd08531e8e8f57a54b808316e5bea9b
