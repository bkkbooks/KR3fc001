body:
  text: 荅曰一百六十歩術曰下有半是二分之一以一爲二半爲一並之得三爲法置田二百四十歩亦以一爲二乗之爲實實如法得從歩今有田廣一歩半三分歩這一求田一畒問從幾何荅曰一百三十歩一十一分歩之一十術曰下有三分以一爲六半爲三三分之一爲二並之得一十一以爲法置田二百四十歩亦以一爲六乗之爲實實如法得從歩今有田廣一歩半三分歩之一四分歩之一求田一畒問從幾何荅曰一百一十五歩五分歩之一術曰下有四分以一爲一十二半爲六三分之一爲四四分之一爲三并之得二十五以爲法置田二百四十歩亦以一爲一
  hash: sha256:6f951a93f79fc18374c969d14479dd8c63a6c236bb343beeec66378a35cf8850
