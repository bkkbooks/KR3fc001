body:
  text: 答曰一百六十步術曰下有半是二分之一以一為二半為一並之得三為法置田二百四十步亦以一為二乘之為實實如法得從步今有田廣一步半三分步這一求田一畒問從幾何答曰一百三十步一十一分步之一十術曰下有三分以一為六半為三三分之一為二並之得一十一以為法置田二百四十步亦以一為六乘之為實實如法得從步今有田廣一步半三分步之一四分步之一求田一畒問從幾何答曰一百一十五步五分步之一術曰下有四分以一為一十二半為六三分之一為四四分之一為三并之得二十五以為法置田二百四十步亦以一為一
  hash: sha256:4806107ed808a80c3ef73a498376aa441ee2cf285a4700507224325bf9697203
