body:
  text: 五經率臣淳風等謹按今有之羲以所有率乘所求合以瓴甓一枚錢一百六十為實但以一乘不長故不復乘是以徑將所買之率與所出之錢為法實也此又按今有之羲出錢為所有數一枚為所求率所買為所有率而今有之即得所求率一不長故不復乘是以徑將所買之率為法以所出之錢為實故實如法得一枚錢不盡者等數而命分術曰以所買率為法所出錢數為實實如法得一錢今有出錢五千七百八十五買漆一斛六斗七升太半升欲斗率之問斗幾何答曰一斗三百四十五錢五百三分錢之一十五今有出錢七百二十買縑一匹二丈一尺欲丈率之問張幾何答曰一丈一百一十八錢六十一分錢之二今有出錢二千三百其實買布九匹二丈七尺欲匹率之問匹幾何
  hash: sha256:26f048dd0893747416ca214475dc433c2f3fb948c83ba7cca9d94c83e5d091ff
