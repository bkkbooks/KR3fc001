body:
  text: 五經率臣淳風等謹按今有之羲以所有率乗所求合以瓴甓一枚錢一百六十爲實但以一乗不長故不復乗是以徑將所買之率與所出之錢爲法實也此又按今有之羲出錢爲所有數一枚爲所求率所買爲所有率而今有之即得所求率一不長故不復乗是以徑將所買之率爲法以所出之錢爲實故實如法得一枚錢不盡者等數而命分術曰以所買率爲法所出錢數爲實實如法得一錢今有出錢五千七百八十五買漆一斛六斗七升太半升欲斗率之問斗幾何荅曰一斗三百四十五錢五百三分錢之一十五今有出錢七百二十買縑一匹二丈一尺欲丈率之問張幾何荅曰一丈一百一十八錢六十一分錢之二今有出錢二千三百其實買布九匹二丈七尺欲匹率之問匹幾何
  hash: sha256:49460b8eefd1ac5bf0090eb268317fefb667f80de0b55e6cc58b544bd44983c2
