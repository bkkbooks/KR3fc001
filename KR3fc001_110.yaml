body:
  text: 術曰下有八分以一為八百四十半為四百二十三分之一為二百八十四分之一為二百一十五分之一為一百六十八六分之一為一百四十七分之一為一百二十八分之一為一百五并之得二千二百八十三以為法置田二百四十步亦以一為八百四十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一求田一畒問從幾何答曰八十四步七千一百二十九分步之五千九百六十四術曰下有九分以一為二千五百二十半為一千二百六十三分之一為八百四十四分之一為六百三十五分之一為五百四六分之一為四百二十七分之一為三百六十八分之一為三百一十五九分之一為二百八十并之得七千一百二十九
