body:
  text: 答曰六錢四分錢之三術曰以月三十日乘千錢為法以三十日乘千錢為法者得三萬是為貸人錢三萬一日息三十也以息三十乘今所貸錢數又以九日乘之為實實如法得一錢以九日乘今所貸錢為今一日所有錢於今有術為所有數息三十為所求率三萬錢為所有率此又可以一月三十日約息三十錢為十分一日以乘今一日所有錢為實千錢為法為率者當等之於一也故三十日或可乘本或可約息皆所以等之也九章算經卷第三
  hash: sha256:b70998bab8c289b7eaa050f4b35733371f0466f33e3dcb5b229a7ed8d4fe83f6
