body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋少廣以御積羃方圎少廣臣淳風等謹按一畒之田廣一歩長二百四十歩今欲截取其從少以益其廣故曰少廣術曰置全歩及分母子以最下分母徧乗諸分子及全歩臣淳風等謹按以分母乗全者通其分也以母乗子者齊其子也各以其母除其子置之於左命通分者又以分母徧乗諸分子及已通者皆通而同之并之爲法臣淳風等謹按諸子悉通故可並之爲法亦冝用合分術列數尤多若用乗則筭數至繁故別制此術從省約置所求歩數以全歩積分乗之爲實置所求歩數以全歩積分乗之爲實此以田廣爲一畒積歩爲實置有分者當同其母齊其子以同乗法實而并齊於法今以分母乗全歩及子子如母而一竝以并全法則法實俱長意亦等也故如法而一得從歩數實如法而一得從歩今有田廣一歩半求田一畒問從幾何
