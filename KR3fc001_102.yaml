body:
  text: 魏劉徽注唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑注釋少廣以御積羃方圎少廣臣淳風等謹按一畒之田廣一步長二百四十步今欲截取其從少以益其廣故曰少廣術曰置全步及分母子以最下分母遍乘諸分子及全步臣淳風等謹按以分母乘全者通其分也以母乘子者齊其子也各以其母除其子置之於左命通分者又以分母遍乘諸分子及已通者皆通而同之并之為法臣淳風等謹按諸子悉通故可並之為法亦冝用合分術列數尤多若用乘則算數至繁故別制此術從省約置所求步數以全步積分乘之為實置所求步數以全步積分乘之為實此以田廣為一畒積步為實置有分者當同其母齊其子以同乘法實而并齊於法今以分母乘全步及子子如母而一並以并全法則法實俱長意亦等也故如法而一得從步數實如法而一得從步今有田廣一步半求田一畒問從幾何
