body:
  text: 次日織三寸三十一分寸之七次日織六寸三十一分寸之十四次日織一尺二寸三十一分寸之二十八次日織二尺五寸三十一分寸之二十五術曰置一二四八十六為列襄副并為法以五尺乘未并者各自為實實如法得一尺今有北鄉算八千七百五十八西鄉算七千二百三十六南鄉算八千三百五十六凡三鄉發徭三百七十八人欲以算數多少襄出之問各幾何答曰北鄉遣一百三十五人一萬二千一百七十五分人之一萬一千六百三十七西鄉遣一百一十二人一萬二千一
