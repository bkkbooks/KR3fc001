body:
  text: 之則亦方錐之見羃故求圎錐之數折徑以乗下周之半即圎錐之羃也今宛田上徑圎穹而與圎錐同術則羃失之於少矣然其術難用故略舉大較施之大廣田也求圎錐之羃猶求圎田之羃也今用兩全相乗故以爲法除之亦如圎田亦開立圎術說圎方諸率甚備可以驗此今有弧田弦三十歩矢十五歩問爲田幾何荅曰畒九十七歩半又有弧田弦七十八歩二分歩之一矢十三歩九分歩之七問爲田幾何荅曰二畒一百五十五歩八十一分歩之五十六術曰以弦乗矢矢又自乗并之二而一方中之圎圎裏十二弧之羃合外方之羃四分之三也方中合外方之半則朱青合外方四分之一也弧田半圎之羃也故依半圎之體而爲之術以弦乗天而半之則爲黄羃矢自乗而半之爲二青羃青黄相連爲弧體弧體法當應規令弧而不至外畔失之於少矣圎田舊術以周三徑一爲率俱得十二弧之羃亦失之於少也與此相似指驗半圎之弧耳若不满半圎者益復踈闊冝依句股鋸圎材之術以弧弦爲鋸道長以矢爲句深而求其徑旣知圎徑則弧可割分也割之者半弧田之弦以爲股其矢爲句爲之求弦即小弧之弦也以半小弧之弦爲句半圎徑爲弦爲之求股以减
