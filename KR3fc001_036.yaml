body:
  text: 之則亦方錐之見羃故求圎錐之數折徑以乘下周之半即圎錐之羃也今宛田上徑圎穹而與圎錐同術則羃失之於少矣然其術難用故略舉大較施之大廣田也求圎錐之羃猶求圎田之羃也今用兩全相乘故以為法除之亦如圎田亦開立圎術說圎方諸率甚備可以驗此今有弧田弦三十步矢十五步問為田幾何答曰畒九十七步半又有弧田弦七十八步二分步之一矢十三步九分步之七問為田幾何答曰二畒一百五十五步八十一分步之五十六術曰以弦乘矢矢又自乘并之二而一方中之圎圎裏十二弧之羃合外方之羃四分之三也方中合外方之半則朱青合外方四分之一也弧田半圎之羃也故依半圎之體而為之術以弦乘天而半之則為黃羃矢自乘而半之為二青羃青黃相連為弧體弧體法當應規令弧而不至外畔失之於少矣圎田舊術以周三徑一為率俱得十二弧之羃亦失之於少也與此相似指驗半圎之弧耳若不滿半圎者益復踈闊冝依句股鋸圎材之術以弧弦為鋸道長以矢為句深而求其徑既知圎徑則弧可割分也割之者半弧田之弦以為股其矢為句為之求弦即小弧之弦也以半小弧之弦為句半圎徑為弦為之求股以减
