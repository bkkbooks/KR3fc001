body:
  text: 今有麥八斗六升七分升之三欲為小䵂問得幾何答曰為小䵂二斗五升一十四分升之一十三術曰以麥求小䵂三之十而一臣淳風等謹按小䵂之率十三半冝以母二通之以乘本麥之數術欲從省先以等數九約之所求之率得三所有之率得十也今有麥一斗欲為大䵂問得幾何答曰為大䵂一斗二斤術曰以麥求大䵂六之五而一臣淳風等謹按大䵂之率五十有四合以大䵂數乘此率術欲從省先以等數九約之所求之率得六術有之率得五也今有出錢一百六十買瓴甓十八枚瓴甓甎也問枚幾何答曰一枚八錢九分錢之八今有出錢一萬三千五百買竹二千三百五十箇問箇幾何答曰一箇五錢四十七分錢之三十
  hash: sha256:f45d81d76534f521b1dd9b1f712a6ff770e23eb3b2709d406dd2d71c4ce7f03e
