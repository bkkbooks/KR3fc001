body:
  text: 今有粟二斗三升欲為糲飯問得幾何答曰為糲飯三斗四升半術曰以粟米糲飯三之二而一臣淳風等謹按糲飯之率七十有五粟求糲飯合以此數乘之今以等數二十有五約其二率所求之率得三所有之率得二故以三乘二除今有粟三斗六升欲為稗飯問得幾何答曰為稗飯三斗八升二十五分升之二十二術曰以粟求稗飯二十七之二十五而一臣淳風等謹按此術與大䵂多同今有粟八斗六升欲為糳飯問得幾何答曰為糳飯八斗二升二十五分升之一十四術曰以粟求糳飯二十四之二十五而一臣淳風等謹按糳飯率四十八此亦半二率而乘除今有粟九斗八升欲為御飯問得幾何答曰為御飯八斗二升二十五分升之八
  hash: sha256:a9b41c361d0760a8e9a2204feb73a9b6a6949cdb000c8ec15f79765e12a68a17
