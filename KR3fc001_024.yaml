body:
  text: 率周三十歩合徑十歩今依宻率合徑九歩十一分歩之六問爲田幾何荅曰七十五歩此於徽術當爲田七十一歩一百五十七分歩之一百三臣淳風等謹依宻率爲田七十一歩二十二分歩之一十三又有圎田周一百八十一歩徑六十歩三分歩之一臣淳風等謹按周三徑一周一百八十一歩徑六十歩三分歩之一依宻率徑五十七歩二十二分歩之十三問爲田幾何荅曰十一畒九十歩十二分歩之一此於徽術當爲田十畒二百八歩三百一十四分歩之一百一十三臣淳風等謹依宻率爲田十畒二百五歩八十八分歩之八十七術曰半周半徑相乗得積歩按半周爲從半徑爲廣故廣從相乗爲積歩也假令圎徑二尺圎中容六弧之一靣與圎徑之半其數均等令徑率一而弧周率三也又按爲圗以六弧之一靣乗一弧半徑二因而六之得十二弧之羃若又割之次以十二弧之一靣乗一弧之半徑四因而六之則得二十四弧之羃割之彌細所失彌少割之又割以至於不可割則與圎周合體而無所失矣弧靣之外猶有餘徑以靣乗徑則羃出弧表若夫弧之細者與圎合體則表無餘徑表無餘徑則羃不外出矣以一靣乗半徑弧而裁之每輒自倍故以半周乗半徑而爲圎羃此以周徑謂至然之數非周三徑一之率也周三者從其六弧之環耳以推圎
