body:
  text: 率周三十步合徑十步今依密率合徑九步十一分步之六問為田幾何答曰七十五步此於徽術當為田七十一步一百五十七分步之一百三臣淳風等謹依密率為田七十一步二十二分步之一十三又有圎田周一百八十一步徑六十步三分步之一臣淳風等謹按周三徑一周一百八十一步徑六十步三分步之一依密率徑五十七步二十二分步之十三問為田幾何答曰十一畒九十步十二分步之一此於徽術當為田十畒二百八步三百一十四分步之一百一十三臣淳風等謹依密率為田十畒二百五步八十八分步之八十七術曰半周半徑相乘得積步按半周為從半徑為廣故廣從相乘為積步也假令圎徑二尺圎中容六弧之一靣與圎徑之半其數均等令徑率一而弧周率三也又按為圗以六弧之一靣乘一弧半徑二因而六之得十二弧之羃若又割之次以十二弧之一靣乘一弧之半徑四因而六之則得二十四弧之羃割之彌細所失彌少割之又割以至於不可割則與圎周合體而無所失矣弧靣之外猶有餘徑以靣乘徑則羃出弧表若夫弧之細者與圎合體則表無餘徑表無餘徑則羃不外出矣以一靣乘半徑弧而裁之每輒自倍故以半周乘半徑而為圎羃此以周徑謂至然之數非周三徑一之率也周三者從其六弧之環耳以推圎
