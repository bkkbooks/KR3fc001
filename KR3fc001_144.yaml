body:
  text: 尺一十五分尺之四問用徒幾何答曰四十七人三千四百八十四分人之四百九術曰置本人功去其出土功五分之一又去沙礫水石之功太半餘為法以塹積尺為實實如法而一即用徒人數按此術置本人功去其出土功五分之一者謂以四乘五除又去沙礫水石作太半者一乘三除存其少半取其定功乃通分內子以為法以分母乘積尺為實者為法裹有分實裏通之故實如法而一即用徒人數不盡者等數約之而命分也今有穿渠上廣一丈八尺下廣三尺六寸深一丈八尺袤五萬一千八百二十四尺問積幾何答曰一千七萬四千五百八十五尺六寸秋程人功三百尺問用徒幾何答曰三萬三千五百八十二人功禸少一十四尺四寸一千人先到問當受袤幾何答曰一百五十四丈三尺二寸八十
  hash: sha256:723d55d46b08e44cdaaaf694b063880a3e2189292fbc68975de2a0a5276d05d4
