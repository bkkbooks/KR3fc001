body:
  text: 耗幾何荅曰一百六十三兩四銖半術曰以一斤展十六兩爲法以七兩乗今有絲兩數爲實實如法得耗數按此術亦今有之義以一斤爲十六兩爲所有率七兩爲所求率今有絲爲所有數而今有之即得今有生絲三十斤乾之耗三斤十二兩今有乾絲一十二斤問生絲幾何荅曰一十三斤一十一兩十銖七分銖之二術曰置生絲兩數除耗數餘以爲法餘四百二十兩即乾絲率三十斤乗乾絲兩數爲實實如法得生絲數凡所得率知細則俱細麄則俱麄兩數相抱而巳故品物不同如上縑絲之比相與乗爲三十斤凡四百八十兩令生絲率四百八十兩令乾絲率四百二十兩則其數相通可俱爲銖可俱爲兩可俱爲斤無所歸滯也若然冝以所有乾絲斤數乗生絲兩數爲實今以斤兩錯互而亦同歸者使乾絲以兩數爲率生絲以類爲率譬之異類亦各有一定之勢臣淳風等謹按此術置生絲兩數除耗數餘即乾絲之率於今有術爲所有率三十斤爲所求率乾絲兩數爲所有數凡所謂率者細則俱細麄則俱麄今有一斤乗兩知乾絲即以兩數爲率生絲即以斤數
