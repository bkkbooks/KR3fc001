body:
  text: 耗幾何答曰一百六十三兩四銖半術曰以一斤展十六兩為法以七兩乘今有絲兩數為實實如法得耗數按此術亦今有之義以一斤為十六兩為所有率七兩為所求率今有絲為所有數而今有之即得今有生絲三十斤乾之耗三斤十二兩今有乾絲一十二斤問生絲幾何答曰一十三斤一十一兩十銖七分銖之二術曰置生絲兩數除耗數餘以為法餘四百二十兩即乾絲率三十斤乘乾絲兩數為實實如法得生絲數凡所得率知細則俱細粗則俱粗兩數相抱而巳故品物不同如上縑絲之比相與乘為三十斤凡四百八十兩令生絲率四百八十兩令乾絲率四百二十兩則其數相通可俱為銖可俱為兩可俱為斤無所歸滯也若然冝以所有乾絲斤數乘生絲兩數為實今以斤兩錯互而亦同歸者使乾絲以兩數為率生絲以類為率譬之異類亦各有一定之勢臣淳風等謹按此術置生絲兩數除耗數餘即乾絲之率於今有術為所有率三十斤為所求率乾絲兩數為所有數凡所謂率者細則俱細粗則俱粗今有一斤乘兩知乾絲即以兩數為率生絲即以斤數
  hash: sha256:c87c6fbf270a93ea4c39d1d86c7d3e0c5977a33fb821c2c0336540e15d79d861
