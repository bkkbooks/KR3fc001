body:
  text: 今有圎錐下周三丈五尺髙五丈一尺問積幾何答曰一千七百三十五尺一十二分尺之五於徽術當積一千六百五十八尺三百一十四分尺之十三依密率為積一千六百五十六尺八十八分尺之四十七術曰下周自乘以髙乘之三十六而一按此術圎錐下周以為方錐下方方錐下方今自乘以髙乘之合三而一得大錐方之積大錐方之積合十二圎矣令求一圎復合十二除之故令三乘十二得三十六而連除於徽術當下周自乘以髙乘之又以二十五乘之九百四十二而一圎錐比於方錐亦二百分之一百五十七命徑自乘者亦當以一百五十七乘之六百而一其説如圎亭也臣淳風等謹按依密率以七乘之二百六十四而一今有塹堵下廣二丈袤一十八丈六尺髙二丈五尺問積幾何答曰四萬六千五百尺術曰廣袤相乘以髙乘之二而一邪解立方得兩塹堵雖復隨方亦為塹堵故二而一此則合所規羃推其物體蓋為塹上疊也其形如城而無上廣與所規棊形異而同實未聞所以名之為塹堵之説也今有陽馬廣五尺袤七尺髙八尺問積幾何
