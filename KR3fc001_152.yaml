body:
  text: 今有圎錐下周三丈五尺髙五丈一尺問積幾何荅曰一千七百三十五尺一十二分尺之五於徽術當積一千六百五十八尺三百一十四分尺之十三依宻率爲積一千六百五十六尺八十八分尺之四十七術曰下周自乗以髙乗之三十六而一按此術圎錐下周以爲方錐下方方錐下方今自乗以髙乗之合三而一得大錐方之積大錐方之積合十二圎矣令求一圎復合十二除之故令三乗十二得三十六而連除於徽術當下周自乗以髙乗之又以二十五乗之九百四十二而一圎錐比於方錐亦二百分之一百五十七命徑自乗者亦當以一百五十七乗之六百而一其說如圎亭也臣淳風等謹按依宻率以七乗之二百六十四而一今有壍堵下廣二丈袤一十八丈六尺髙二丈五尺問積幾何荅曰四萬六千五百尺術曰廣袤相乗以髙乗之二而一邪解立方得兩壍堵雖復隨方亦爲壍堵故二而一此則合所規羃推其物體蓋爲壍上曡也其形如城而無上廣與所規棊形異而同實未聞所以名之爲壍堵之說也今有陽馬廣五尺袤七尺髙八尺問積幾何
