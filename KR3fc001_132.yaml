body:
  text: 令圎羃居方羃四分之三圎囷居立方亦四分之三更令圎囷為方率十二為丸率九丸居圎囷又四分之三也置四分自乘得十六三分自乘得九故丸居立方十六分之九也故以十六乘積九而一得立方之積丸徑與立方等故開立方而除得徑也然此意非也何以驗之取立方棊八枚皆令立方一寸積之為立方二寸規之為圎囷徑二寸髙二寸又復橫因之則其形有似牟合方蓋矣八棊皆似陽馬圎然也按合蓋者方率也丸居其中即圎率也推此言之謂夫圎囷為方率豈不闕哉以周三徑一為圎率則圎羃傷少令圎囷為方率則丸積傷多互相通補是以丸與十六之率偶與實相近而丸猶傷多耳觀立方之內合蓋之外雖裴殺有漸而多少不掩判合總結方圎相纒濃纎詭互不可等正欲陋形措意懼失正理敢不闕疑以俟能言者黃金方寸重十六兩金丸徑寸重九兩率生於此未曾驗也周官考工記桌氏為量攺煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之言鋉金使極精而後分之則可以為率也今丸徑自乘三而一開方除之即丸中之立方也假令丸中立方五尺五尺為句句自乘羃二十五尺倍之得五十尺以為股羃謂平靣方五尺之弦也以此弦羃為股亦以五尺為句井句股羃得七十五尺是為大弦羃開方除之則大弦可知也大弦則中立方之長邪邪即丸徑也故中立方自乘之羃於丸徑自乘之羃三分之一也今大弦還乘其羃即丸外立方之積也大弦羃關之不盡令囷羃七十五再自乘之為靣命得外立方積四十二萬一千八百七十五尺之靣又令中立方五尺自乘又以方乘之得積一百二十五尺一百二十五尺自乘
