body:
  text: 令圎羃居方羃四分之三圎囷居立方亦四分之三更令圎囷爲方率十二爲丸率九丸居圎囷又四分之三也置四分自乗得十六三分自乗得九故丸居立方十六分之九也故以十六乗積九而一得立方之積丸徑與立方等故開立方而除得徑也然此意非也何以驗之取立方棊八枚皆令立方一寸積之爲立方二寸規之爲圎囷徑二寸髙二寸又復横因之則其形有似牟合方蓋矣八棊皆似陽馬圎然也按合蓋者方率也丸居其中即圎率也推此言之謂夫圎囷爲方率豈不闕哉以周三徑一爲圎率則圎羃傷少令圎囷爲方率則丸積傷多互相通補是以丸與十六之率偶與實相近而丸猶傷多耳觀立方之内合蓋之外雖裵殺有漸而多少不掩判合緫結方圎相纒濃纎詭互不可等正欲陋形措意懼失正理敢不闕疑以俟能言者黄金方寸重十六兩金丸徑寸重九兩率生於此未曾驗也周官考工記桌氏爲量攺煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之言鋉金使極精而後分之則可以爲率也今丸徑自乗三而一開方除之即丸中之立方也假令丸中立方五尺五尺爲句句自乗羃二十五尺倍之得五十尺以爲股羃謂平靣方五尺之弦也以此弦羃爲股亦以五尺爲句井句股羃得七十五尺是爲大弦羃開方除之則大弦可知也大弦則中立方之長邪邪即丸徑也故中立方自乗之羃於丸徑自乗之羃三分之一也今大弦還乗其羃即丸外立方之積也大弦羃關之不盡令囷羃七十五再自乗之爲靣命得外立方積四十二萬一千八百七十五尺之靣又令中立方五尺自乗又以方乗之得積一百二十五尺一百二十五尺自乗
