body:
  text: 為率譬之異物各有一定之率也今有田一畒收粟六升太半升今有田一頃二十六畒一百五十九步問收粟幾何答曰八斛四斗四升一十二分升之五術曰以畒二百四十步為法以六升太半升乘今有田積步為實實如法得粟數按此術亦今有之義以一畒步數為所有率六升太半升為所求率今有田積步為所有數而今有之即得今有取保一歲價錢二千五百今先取一千二百問當作日幾何答曰一百六十九日二十五分日之二十三術曰以價錢為法以一歲三百五十四日乘先取錢數為實實如法得日數按此術亦今有之義以價為所有率一歲日數為所求率取錢為所有數而今有之即得今有貸人千錢月息三十今有貸人七百五十錢九日歸之問息幾何
