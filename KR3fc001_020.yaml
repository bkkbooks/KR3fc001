body:
  text: 答曰一百二十步九分步之五又有田廣十八步七分步之五從二十三步十一分步之六問為田幾何答曰一畒二百步十一分步之七大廣田臣淳風等謹按大廣田知初術直有全步而無餘分次術空有餘分而無全步此術先見全步復有餘分可以廣兼三術故曰大廣術曰分母各乘其全分子從之分母各乘其全分子從之者通全步內分子如此則母子皆為實矣相乘為實分母相乘為法猶乘分也實如法而一今為術廣從俱有分當各自通其分命母入者還須出之故令分母相乘為法而連除之今有圭田廣十二步正從二十一步問為田幾何答曰一百二十六步又有圭田廣五步二分步之一從八步三分步之二問為田幾何答曰二十三步六分步之五術曰半廣以乘正從半廣知以盈補虛為直田也亦可半正從以乘廣按平廣乘從以取中平之數故廣從相乘為積步畒法除之即得也
