body:
  text: 而爲四規内棊一謂之内棊規外棊三謂之外棊規更合四棊復横斷之以句股言之令餘髙爲句内棊斷上方爲股本方之數其弦也句股之法以句羃减弦羃則餘爲股羃若令餘髙自乗减本方之羃餘即内减棊斷上方之羃也本方之羃即外四棊之斷上羃然則餘髙自乗即外三棊之斷上羃矣不問髙卑勢皆然也然固有所歸同而塗殊者爾而乃控逺以演類借况以析微按陽馬方髙數參等者列而立之横截去上則髙自乗與斷上羃數亦等焉去疊棊成立積緑羃勢旣同則積不容異由此觀之規之外三棊旁蹙爲一即一陽馬也三分立方則陽馬居一内棊居二可知矣合八小方成一大方合八内棊成一合蓋内棊居小方三分之二則合盖居立方亦三分之二較然驗矣置三分之二以圎羃率三乗之如方羃率四而一約而定之以爲丸率故曰丸居立方三分之一也等數旣宻心亦昭晰張衡放舊貽哂扵後劉徽循故未暇校新夫豈難哉抑未之思也依宻率立此圎積本以圎徑再自乗十一乗之二十一而一約此積今欲求其本積故以二十一乗之十一而一凡物再自乗開立方除之復其本數故立方除之即丸徑也九章筭經卷第四
