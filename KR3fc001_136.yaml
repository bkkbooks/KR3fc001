body:
  text: 而為四規內棊一謂之內棊規外棊三謂之外棊規更合四棊復橫斷之以句股言之令餘髙為句內棊斷上方為股本方之數其弦也句股之法以句羃減弦羃則餘為股羃若令餘髙自乘減本方之羃餘即內減棊斷上方之羃也本方之羃即外四棊之斷上羃然則餘髙自乘即外三棊之斷上羃矣不問髙卑勢皆然也然固有所歸同而塗殊者爾而乃控逺以演類借况以析微按陽馬方髙數參等者列而立之橫截去上則髙自乘與斷上羃數亦等焉去疊棊成立積緑羃勢既同則積不容異由此觀之規之外三棊旁蹙為一即一陽馬也三分立方則陽馬居一內棊居二可知矣合八小方成一大方合八內棊成一合蓋內棊居小方三分之二則合蓋居立方亦三分之二較然驗矣置三分之二以圎羃率三乘之如方羃率四而一約而定之以為丸率故曰丸居立方三分之一也等數既密心亦昭晰張衡放舊貽哂于後劉徽循故未暇校新夫豈難哉抑未之思也依密率立此圎積本以圎徑再自乘十一乘之二十一而一約此積今欲求其本積故以二十一乘之十一而一凡物再自乘開立方除之復其本數故立方除之即丸徑也九章算經卷第四
