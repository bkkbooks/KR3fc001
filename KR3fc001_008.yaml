body:
  text: 分數同類者無逺數異類者無近遠而通體知雖異位而相從也近而殊形知雖同列而相違也然則齊同之術要矣錯綜度數動之斯諧其猶佩觽解結無往而不理焉乘以散之約以聚之齊同以通之此其算之網紀乎其一術者可令母除為率率乘子為齊實如法而一不蒲法者以法命之今欲求其實故齊其子又同其母令如母而一其餘以等數約之即得知所謂同法為母實餘為子皆從此例其母同者直相從之今有九分之八减其五分之一問餘幾何答曰四十五分之三十一又有四分之三减其三分之一問餘幾何答曰十二分之五減分臣淳風等謹按諸分子母數各不同以少減多欲知餘幾何餘為實故曰減分術曰母互乘子以少減多餘為實母相乘為法實如法而一母互乘子者知以齊其子也以少减多者知齊故可相减也母相乘為法者同其母母同子齊故如母而一即得今有八分之五二十五分之十六問孰多多幾何答曰二十五分之十六多多二百分
