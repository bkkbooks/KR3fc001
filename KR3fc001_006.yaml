body:
  text: 數亦同歸爾法實相推動有參差故爲術者先治諸分術曰可半者半之不可半者副置分母子之數以少減多更相减損求其等也以等數約之等數約之即除也其所以相减者皆等數之重疊故以等數約之今有三分之一五分之二問合之得幾何荅曰十五分之十一又有三分之二七分之四九分之五問合之得幾何荅曰得一六十三分之五十又有二分之一三分之二四分之三五分之四問合之得幾何荅曰得二六十分之四十三合分臣淳風等謹按合分知數非一端分無定凖諸分子雜互羣母參差麄細旣珠理難從一故齊其衆分同其羣母令可相并故曰合分術曰母互乗子并以爲實母相乗爲法母互乗子約而言之者其分麄繁而言之者其分細雖則麄細有殊然其實一也衆分錯難非細不會乗而散之所以通之通之則可并也凡母互乗子謂之齊羣母相乗謂之同同者相與通同共一母也齊者子與母齊勢不可失本數也方以類聚物以羣
