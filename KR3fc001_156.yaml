body:
  text: 修短廣狹然不有鱉腝無以審陽馬之數不有陽馬無以知錐亭之類功實之主也今有鱉腝下廣五尺無袤上袤四尺無廣髙七尺問積幾何答曰二十三尺少半尺術曰廣袤相乘以髙乘之六而一按此術腝者臂骨也或曰半陽馬其形有似鱉肘故以名云中破陽馬得兩鱉腝之見數即陽馬之半數數同而實據半故云六而一即得今有羡除下廣六尺上廣一丈深三尺末廣八尺無深袤七尺問積幾何答曰八十四尺術曰並三廣以深乘之又以袤乘之六而一按此術羡除實隧道也其所穿地上平下邪似兩鱉腝夾一塹堵即羡除之形假令用此棊上廣三尺深一尺下廣一尺末廣一尺無深袤一尺下廣皆塹堵之廣者兩鱉腝與一塹堵相連之廣也以深袤乘得積五尺鱉腝居二塹堵居三其於本棊皆一為六故六而一合四陽馬以為方錐邪盡方錐之底亦令為中方就中方削而上合全為中方錐之半於是陽馬之棊悉中解矣中錐離而為四鱉腝焉故外錐之半亦為四鱉腝雖背正異形與常所謂鱉腝參不相似實則同也所雲夾塹堵者中錐之鱉腝也凡塹堵上袤短者陽馬也下袤短者與鱉腝連也下兩袤相等知亦
