body:
  text: 修短廣狹然不有鼈腝無以審陽馬之數不有陽馬無以知錐亭之類功實之主也今有鼈腝下廣五尺無袤上袤四尺無廣髙七尺問積幾何荅曰二十三尺少半尺術曰廣袤相乗以髙乗之六而一按此術腝者臂骨也或曰半陽馬其形有似鼈肘故以名云中破陽馬得兩鼈腝之見數即陽馬之半數數同而實據半故云六而一即得今有羨除下廣六尺上廣一丈深三尺末廣八尺無深袤七尺問積幾何荅曰八十四尺術曰並三廣以深乗之又以袤乗之六而一按此術羨除實隧道也其所穿地上平下邪似兩鼈腝夾一壍堵即羨除之形假令用此棊上廣三尺深一尺下廣一尺末廣一尺無深袤一尺下廣皆壍堵之廣者兩鼈腝與一壍堵相連之廣也以深袤乗得積五尺鼈腝居二壍堵居三其於本棊皆一爲六故六而一合四陽馬以爲方錐邪盡方錐之底亦令爲中方就中方削而上合全爲中方錐之半於是陽馬之棊悉中解矣中錐離而爲四鼈腝焉故外錐之半亦爲四鼈腝雖背正異形與常所謂鼈腝參不相似實則同也所雲夾壍堵者中錐之鼈腝也凡壍堵上袤短者陽馬也下袤短者與鼈腝連也下兩袤相等知亦
