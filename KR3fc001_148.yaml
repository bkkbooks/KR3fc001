body:
  text: 何答曰一十萬一千六百六十六尺太半尺術曰上下方相乘又各自乘并之以髙乘之三而一此章有塹堵陽馬皆合而成立方蓋説算者乃立棊三品以效髙深之積假令方亭上方一尺下方三尺髙一尺其用棊也中央立方一四靣塹堵四四角陽馬四上下方相乘為三尺以髙乘之約積三尺是為得中央立方一四靣塹堵各一上方自乘亦得中央立方一下方自乘為九以髙乘之得積丸尺是為中央立方一四靣塹堵各二四角陽馬各三也上方自乘以髙乘之得積一尺又為中央立方一凡三品棊皆一而為三故三而一得積尺用棊之數立方三塹堵陽馬各十二凡二十七棊十三更差次之而成方亭者三驗矣為術又可令方差自乘以髙乘之三而一即四陽馬也上下方相乘以髙乘之即中央立方及四靣塹堵也并之以為方亭積數也今有圎亭下周三丈上周二丈髙一丈問積幾何答曰五百二十七尺九分尺之七於徽術當積五百四尺四百七十一分尺之一百一十六也按密率為積五百三尺三十三分尺之二十六
