body:
  text: 何荅曰一十萬一千六百六十六尺太半尺術曰上下方相乗又各自乗并之以髙乗之三而一此章有壍堵陽馬皆合而成立方蓋說筭者乃立棊三品以效髙深之積假令方亭上方一尺下方三尺髙一尺其用棊也中央立方一四靣壍堵四四角陽馬四上下方相乗爲三尺以髙乗之約積三尺是爲得中央立方一四靣壍堵各一上方自乗亦得中央立方一下方自乗爲九以髙乗之得積丸尺是爲中央立方一四靣壍堵各二四角陽馬各三也上方自乗以髙乗之得積一尺又爲中央立方一凡三品棊皆一而爲三故三而一得積尺用棊之數立方三壍堵陽馬各十二凡二十七棊十三更差次之而成方亭者三驗矣爲術又可令方差自乗以髙乗之三而一即四陽馬也上下方相乗以髙乗之即中央立方及四靣壍堵也并之以爲方亭積數也今有圎亭下周三丈上周二丈髙一丈問積幾何荅曰五百二十七尺九分尺之七於徽術當積五百四尺四百七十一分尺之一百一十六也按宻率爲積五百三尺三十三分尺之二十六
