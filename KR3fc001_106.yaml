body:
  text: 十二乘之為實實如法而一得從步今有田廣一步半三分步之一四分步之一五分步之一求田一畒問從幾何答曰一百五步一百三十七分步之一十五術曰下有五分以一為六十半為三十三分之一為二十四分之一為一十五五分之一為一十二並之得一百三十七以為法置田二百四十步亦以一為六十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一求田一畒問從幾何答曰九十七步四十九分步之四十七術曰下有六分以一為一百二十半為六十三分之一為四十四分之一為三十五分之一為二十四六分之一為二十并之得二百九十四以為法置田二百四十步
