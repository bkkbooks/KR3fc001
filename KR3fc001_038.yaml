body:
  text: 半徑其餘即小弦之矢也割之又割使至極細但舉弦矢相乘之數則必近密率矣然於算數差繁必欲有所尋究也若但度田取其大數舊術為約耳令有環田中周九十二步外周一百二十二步徑五步此欲令與周三徑一之率相應故言徑五步也據中外周以徽術言之當徑四步一百五十七分步之一百二十二也臣淳風等謹按依密率合徑四步二十二分步之十七問為田幾何答曰二畒五十五步於徽術當為田二畒三十一步一百五十七分步之二十三臣淳風等依密率為田二畒三十步二十二分步之十五又有環田中周六十二步四分步之三外周一百一十三步二分步之一徑十二步三分步之二此田環而不通匝故徑十二步三分步之二若據上周求徑者此徑失之於多過周三徑一分率蓋為踈矣於徽術當徑八步六百二十八分步之五十一臣淳風等謹按依周三徑一考之合徑八步二十四分步之一十一依密率合徑八步一百七十六分步之一十三問為田幾何答曰四畒一百五十六步四分步之一於徽術當為田二畒二百三十二步五千二十四分步之七百八十七也依周三徑一為田三畒二十五步六十四分步之二十五臣淳風
