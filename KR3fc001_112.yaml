body:
  text: 以為法置田二百四十步亦以一為二千五百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一九分步之一十分步之一求田一畒問從幾何答曰八十一步七千三百八十一分步之六千九百三十九術曰下有一十分之一為二千五百二十半為一千二百六十三分之一為八百四十四分之一為六百三十五分之一為五百四六分之一為四百二十七分之一為三百六十八分之一為三百一十五九分之一為二百八十十分之一為二百五十二并之得七千三百八十一以為法置田二百四十步亦以一為二千五百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五
