body:
  text: 除三靣三廉一隅皆巳有羃以上議命之而除去三袤之厚也除巳倍下并中從定法凡再以中三以下加定法者三廉各當以兩靣之羃連於三廉之端以待復除也言不盡意解此要當以棊乃得明耳復除折下如前開之不盡者亦為不可開術亦有以定法命分者不如故羃開方以微為分也若積有分者通分內子為定實定實乃開之訖開其母以報除臣淳風等按分母可開者並通之積先合三母既開之後一母尚存故開分母求一母為法以報除也若母不可開者又以母再乘定實乃開之訖令如母而一臣淳風等謹按分母不可開者本一母也又以母再乘之令合三母既開之後一母猶存故令一母而一得全靣也按開立方知立方適等求其一靣之數借一算步之超二位者但立方求積方再自乘就積開之故超二位言千之靣十言百萬之靣百議所以再乘所借算為法而以除知求為方羃以議命之而除則立方等也除巳三之為定法為積未盡當復更除故豫張三靣巳定方羃為定法復折除而下知三靣方羃皆巳有自乘之數須得折議定其厚薄據開平方百之靣十其開立方即千之靣十而定法巳有成方之羃故復除之者當以千為百折下一等以三乘所得數置中行者設三廉之定長復借一算置下行者欲以為隅方立方等未有數且置一算定其位也步之中超一下超二者上方法長自乘而一折中廉法但有長故降一等下隅法無靣長故又降一等復
