body:
  text: 除三靣三廉一隅皆巳有羃以上議命之而除去三袤之厚也除巳倍下并中從定法凡再以中三以下加定法者三廉各當以兩靣之羃連於三廉之端以待復除也言不盡意解此要當以棊乃得明耳復除折下如前開之不盡者亦爲不可開術亦有以定法命分者不如故羃開方以微爲分也若積有分者通分内子爲定實定實乃開之訖開其母以報除臣淳風等按分母可開者並通之積先合三母旣開之後一母尚存故開分母求一母爲法以報除也若母不可開者又以母再乗定实乃開之訖令如母而一臣淳風等謹按分母不可開者本一母也又以母再乗之令合三母旣開之後一母猶存故令一母而一得全靣也按開立方知立方適等求其一靣之數借一筭歩之超二位者但立方求積方再自乗就積開之故超二位言千之靣十言百萬之靣百議所以再乗所借筭爲法而以除知求爲方羃以議命之而除則立方等也除巳三之爲定法爲積未盡當復更除故豫張三靣巳定方羃爲定法復折除而下知三靣方羃皆巳有自乗之數須得折議定其厚薄據開平方百之靣十其開立方即千之靣十而定法巳有成方之羃故復除之者當以千爲百折下一等以三乗所得數置中行者設三廉之定長復借一筭置下行者欲以爲隅方立方等未有數且置一筭定其位也歩之中超一下超二者上方法長自乗而一折中廉法但有長故降一等下隅法無靣長故又降一等復
