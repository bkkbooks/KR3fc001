body:
  text: 一分寸之八術曰以一人功尺數乘先到人數為實以一千人一日功為實立實為功并渠上下廣而半之以深乘之為法以渠廣深之立實為法實如法得袤尺今有方堢壔堢者堢城也壔音丁老切又音纛謂以土擁木也方一丈六尺髙一丈五尺問積幾何答曰三千八百四十尺術曰方自乘以髙乘之即積尺今有圎堢壔周四丈八尺髙一丈一尺問積幾何答曰二千一百一十二尺於徽術當積二千一十七尺一百五十七分尺之一百三十一臣淳風等謹按依密率積二千一十六尺術曰周自相乘以髙乘之十二而一此章諸術一十四而一此之圎羃亦如圎田之羃也求羃亦如圎田而以髙乘羃也臣淳風等謹按依密率以七乘之八十八而一今有方亭下方五丈上方四丈髙五尺問積幾
