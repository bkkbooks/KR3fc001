body:
  text: 一分寸之八術曰以一人功尺數乗先到人數爲實以一千人一日功爲實立實爲功并渠上下廣而半之以深乗之爲法以渠廣深之立實爲法實如法得袤尺今有方堢壔堢者堢城也壔音丁老切又音纛謂以土擁木也方一丈六尺髙一丈五尺問積幾何荅曰三千八百四十尺術曰方自乗以髙乗之即積尺今有圎堢壔周四丈八尺髙一丈一尺問積幾何荅曰二千一百一十二尺於徽術當積二千一十七尺一百五十七分尺之一百三十一臣淳風等謹按依宻率積二千一十六尺術曰周自相乗以髙乗之十二而一此章諸術一十四而一此之圎羃亦如圎田之羃也求羃亦如圎田而以髙乗羃也臣淳風等謹按依宻率以七乗之八十八而一今有方亭下方五丈上方四丈髙五尺問積幾
