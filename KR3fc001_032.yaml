body:
  text: 靣徑短不至外規若以徑言之則爲規六尺徑二尺靣徑皆一尺靣徑股不至外畔定無二尺可知故周三徑一之率於圎周乃是徑多周少徑一周三理非精宻蓋術從簡要舉大綱略而言之劉徽將以爲踈遂乃改張其率但周徑相乗數難契合徽雖出斯二法終不能究其纎毫也祖冲之以其不精就中更推其數今者修撰攈摭諸家考其是非冲之爲宻故顕之於徽術之下冀學者之所裁爲又術曰周徑相乗四而一此周與上弧同耳周徑相乗各當以半而今周徑田全故兩母相乗爲四以報除之於徽術以五十乗周一百五十七而一即徑也以一百五十七乗徑五十而一即周也新術徑率猶當㣲少則據周以求徑則失之長據徑以求周則失之短諸據見徑以求羃者皆失之於微少據周以求羃者皆失之於㣲多臣淳風等按依宻率以七乗周二十二而一即徑以二十二乗徑七而一即周依術之即得又術曰徑自相乗三之四而一按方圎徑自乗爲外方三之四而一者是爲圎居外方四分之三也若令六弧之一靣乗半徑其羃即外方四分之一也因而三之即亦君外方四分之三也是謂圎裹十二弧之羃耳取以爲圎失之於㣲少於徽新術當徑自乗又以一百五十七乗之二百而一臣淳風等謹按宻率令徑自乗以十一乗之十四而一即圎羃也又術曰周自相乗十二而一六弧之周其於圎徑三與一也故六弧之周自相乗爲羃若圎徑自乗者九方九方凡爲十二弧者十有二故
