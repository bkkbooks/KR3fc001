body:
  text: 靣徑短不至外規若以徑言之則為規六尺徑二尺靣徑皆一尺靣徑股不至外畔定無二尺可知故周三徑一之率於圎周乃是徑多周少徑一周三理非精密蓋術從簡要舉大綱略而言之劉徽將以為踈遂乃改張其率但周徑相乘數難契合徽雖出斯二法終不能究其纎毫也祖沖之以其不精就中更推其數今者修撰攈托諸家考其是非沖之為密故顯之於徽術之下冀學者之所裁為又術曰周徑相乘四而一此周與上弧同耳周徑相乘各當以半而今周徑田全故兩母相乘為四以報除之於徽術以五十乘周一百五十七而一即徑也以一百五十七乘徑五十而一即周也新術徑率猶當微少則據周以求徑則失之長據徑以求周則失之短諸據見徑以求羃者皆失之於微少據周以求羃者皆失之於微多臣淳風等按依密率以七乘周二十二而一即徑以二十二乘徑七而一即周依術之即得又術曰徑自相乘三之四而一按方圎徑自乘為外方三之四而一者是為圎居外方四分之三也若令六弧之一靣乘半徑其羃即外方四分之一也因而三之即亦君外方四分之三也是謂圎裹十二弧之羃耳取以為圎失之於微少於徽新術當徑自乘又以一百五十七乘之二百而一臣淳風等謹按密率令徑自乘以十一乘之十四而一即圎羃也又術曰周自相乘十二而一六弧之周其於圎徑三與一也故六弧之周自相乘為羃若圎徑自乘者九方九方凡為十二弧者十有二故
