body:
  text: 術曰以一斤價數為法以一斤乘今有錢數為實實如法得絲數按此術今有之義以一斤價為所有率一斤為所求率今有錢為所有數而今有之即得今有絲一斤價直三百四十五今有絲七兩一十二銖問得錢幾何答曰一百六十一錢三十二分錢之二十三術曰以一斤銖數為法以一斤價數乘七兩一十二銖為實實如法得錢數按此術亦今有之義以絲一斤數為所有率價錢為所求率今有絲為所有數而今有之即得今有縑一丈價直一百二十八今有縑一匹九尺五寸問得錢幾何答曰六百三十三錢五分錢之三術曰以一丈寸數為法以價錢數乘今有縑寸數為實實如法得錢數臣淳風等謹按此術亦今有之義以縑一丈寸數為所有率價錢為所求率今有縑寸數為所有數而今有之即得今有布一匹價直一百二十五今有布二丈七
