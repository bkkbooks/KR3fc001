body:
  text: 尺問得錢幾何答曰八十四錢八分錢之三術曰以一匹尺數為法今有布尺數乘價錢為實實如法得錢數按此術亦今有之義以一匹尺數為所有率價錢為所求率今有布為所有數今有之即得今有素一匹一丈價直六百二十五今有錢五百問得素幾何答曰得素一匹術曰以價直為法以一匹一丈尺數乘今有錢數為實實如法得素數按此術亦今有之義以價錢為所有率五丈尺數為所求率今有錢為所有數今有之即得今有與人絲一十四斤約得縑一十斤今與人縑四十五斤八兩問得縑幾何答曰三十二斤八兩術曰以一十四斤兩數為法以一十斤乘今有絲兩數為實實如法得縑數此術亦今有之義以一十四斤兩數為所有率一十斤為所求率今有絲為所有數今有之即得今有絲一斤耗七兩今有絲二十三斤五兩問
