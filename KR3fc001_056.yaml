body:
  text: 答曰為粟三十三斗三升少半升術曰以御米求粟五十之二十一而一今有稻一十二斗六升一十五分升之一十四欲為粟問得幾何答曰為粟一十斗五升九分升之七術曰以稻求粟五分之六而一今有糲米一十九斗二升七分升之一欲為稗米問得幾何答曰為稗米一十七斗二升一十四分升之一十三術曰以糲米求稗米九之十而一臣淳風等謹按稗率二十七合以此數乘糲米術欲從者先以等數三約之所求之率得九所有之率得十故九乘而十除今有糲米六斗四升五分升之三欲為糲飯問得幾何答曰為糲飯一十六斗一升半術曰以糲米求糲飯五之二而一臣淳風等謹按糲飯之率七十有五冝以本糲飯乘此率數術欲從省先以等數十五約之所求之
