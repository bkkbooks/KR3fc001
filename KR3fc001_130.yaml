body:
  text: 置議以一乘中者為三廉借羃再乘下當今隅自乘為方羃皆副以加定法以定法除者三靣三廉一隅皆巳有羃以上議命之而除去三袤之厚除巳倍下併中從定法者三廉各當以兩靣之羃連於兩方之靣一隅連於三廉之端以待復除其開之不盡者折下如前開方即合所問有分者通分內子開之訖開其母以報除可開者以通之積先合三母既開之後一母尚存故開分母者求一母為法以報除若母不可開者又以母再乘定實乃開之訖令如母而一分母不可開者本一母又以母再乘令合三母既開之後亦一母尚存故令如母而一得全靣也今有積四千五百尺亦謂立方之尺也問為立圎徑幾何答曰二十尺依密率立圎徑二十尺計積四千一百九十尺二十一分尺之一十又有積一萬六千四百四十八億六千六百四十三萬七千五百尺問為立圎徑幾何答曰一萬四千三百尺依密率為徑一萬四千六百四十三尺四分尺之三開立圎術曰置積尺數以十六乘之九而一所得開立方除之即丸徑立圎即丸也為術者蓋依周三徑一之率
