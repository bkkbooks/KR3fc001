body:
  text: 答曰九十三尺少半尺術曰廣袤相乘以髙乘之三而一按此術陽馬之形方錐一隅也今謂四柱屋隅為陽馬假令廣袤各一尺髙一尺相乘之得立方積一尺邪解立方得兩塹堵邪解塹堵其一為陽馬一為鱉腝陽馬居二鱉腝居一不易之率也合兩鱉腝成一陽馬合三陽馬而成一立方故三而一驗之以棊其形露矣悉割陽馬凡為六鱉腝觀其割分則體勢互通蓋易了也其棊或修短或廣狹立方不等者亦割分以為六鱉腝其形不悉相似然見數同積實均也鱉腝殊形陽馬異體然陽馬異體則不純合不純合則難為之矣何則按邪解方棊以為塹堵者必當以半為分邪解塹堵以為陽馬者亦必當以半為分一從一橫耳設以陽馬為分內鱉腝為分外棊雖或隨修短廣狹猶有此分常率知殊形異體亦同也者以此而巳其使鱉腝廣袤各髙二尺用塹堵鱉腝之棊各二皆用赤棊又使陽馬之廣袤髙各二尺用立方之棊一塹堵陽馬之棊各二皆用黑棊棊之赤黑接為塹堵廣袤髙各二尺於是中效其廣又中分其髙令赤黑塹堵各自適當一方髙二尺方一尺每二分鱉腝則一陽馬也其餘兩端各積本體合成一方焉是為别種而方者率居三通其體而方者率居一雖方隨棊攺而固有常然之勢也按餘數具而可知者有一二分之别即一二之為率定矣其於理也豈虛矣若為數而窮之置餘廣袤髙之數各半之則四分之三又可知也半之彌少其餘彌細至細曰微微則無形由是言之安取餘哉數而求窮之者謂以精推不用籌算鱉腝之物不同器用陽馬之形或隨
