body:
  text: 淳風等謹依密率為周六十一步一百分步之四十一開圎術曰置積步數以十二乘之以開方除之即得周此術以周三徑一為率與舊圎田術相返覆也於徽術以三百一十四乘積如二十五而一所得開方除之即周也開方除之即徑是為據見羃以求周猶失之於徽少其以二百乘積一百五十七而一開方除之即徑猶失這於微多臣淳風等謹按此注於徽術求周之法其中不用開方除之即徑六字今本有者衍賸也依密率八十八乘之七而一按周三徑一之率假令周六徑二半周半徑相乘得羃三周六自乘得三十六俱以等數除羃得一周之數十二也其積本周自乘合以一乘之十二而一得積三也術為一乘不長故以十二而一得此積今還元置此積三以十二乘之者復其本周自乘之數凡物自乘開方除之復其本數故開方除之即周今有積一百八十六萬八百六十七尺此尺謂立方之尺也凡物有髙深而言積者曰立方問為立方幾何答曰一百二十三尺又有積一千九百五十三尺八分尺之一問為立方幾何答曰一十二尺半
  hash: sha256:756b7d55ce1b97b593e705bda1f9664cbe6e9a03e71cb01b683d545040d44a86
