body:
  text: 答日一匹二百四十四錢一百二十九分錢之一百二十四今有出錢一萬三千六百七十買絲一石二鈞一十七斤欲石率之問石幾何答曰一石八千三百二十六錢一百九十七分錢之百七十八經率此術猶經分臣淳風等謹按今有之義錢為所求率物為所有數故以乘錢又以分母乘之為實實如法而一有分者通之所買通分內子為所有率故以為法得錢數不盡而命分者因法為母實餘為子實見不滿故以命之術曰以所求率乘錢數為實以所買率為法實如法得一今有出錢五百七十六買竹七十八箇欲其大小率之問各幾何答曰其四十八箇箇七錢其三十箇箇八錢今有出錢一千一百二十買絲一石二鈞十八今欲其貴賤斤率之問各幾何
  hash: sha256:6fd93f2e2e2d340de3d67320e4db2f2dbe34dda453efe15e8211d23f30033bb3
