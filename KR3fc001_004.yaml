body:
  text: 一畒田廣十五步從而疏之令為十五行即每行廣一步而從十六步又橫而截之令為十六行即每行廣一步而從十五步此即從疏橫截之步各自為方凡有二百四十步為一畒之地步數正同以此言之即廣從相乘得積驗矣二百四十步者畒法也百畒者頃法也故以除之即得今有田廣一里從一里問為田幾何答曰三頃七十五畒又有田廣二里從三里問為田幾何答曰二十二頃五十畒里田術曰廣從里數相乘得積里以三百七十五乘之即畒數按此術廣從里數相乘得積里故方里之中有三頃七十五畒故以乘之即得畒數也今有十八分之十二問約之得幾何答曰三分之二又有九十一分之四十九問約之得幾何答曰十三分之七約分按約分者物之數量不可悉全必以分言之分為數繁則難用設有四分之二者繁而言之亦可為八分之四約而言之則二分之一也雖則異辭於為
