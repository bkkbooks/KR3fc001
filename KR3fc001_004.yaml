body:
  text: 一畒田廣十五歩從而疏之令爲十五行即每行廣一歩而從十六歩又橫而截之令爲十六行即每行廣一歩而從十五歩此即從疏橫截之歩各自爲方凡有二百四十歩爲一畒之地歩數正同以此言之即廣從相乗得積驗矣二百四十歩者畒法也百畒者頃法也故以除之即得今有田廣一里從一里問爲田幾何荅曰三頃七十五畒又有田廣二里從三里問爲田幾何荅曰二十二頃五十畒里田術曰廣從里數相乗得積里以三百七十五乗之即畒數按此術廣從里數相乗得積里故方里之中有三頃七十五畒故以乗之即得畒數也今有十八分之十二問約之得幾何荅曰三分之二又有九十一分之四十九問約之得幾何荅曰十三分之七約分按約分者物之數量不可悉全必以分言之分爲數繁則難用設有四分之二者繁而言之亦可爲八分之四約而言之則二分之一也雖則異辭於爲
