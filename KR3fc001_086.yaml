body:
  text: 法得一斗稟前五人十五斗者大夫得五斗不更得四斗簮裊得三斗上造得二斗公士得一斗欲令五人各依所得粟多少減與後來大夫即與前來大夫同據前來大夫巳得五斗故言亦也各以所得斗數為襄并得十五而加後來大夫亦五斗凡二十為法也是為六人共出五斗後來大夫亦俱損折今有術副并為所有率未并者各為所求率五斗為所有數而今有之即得今有稟粟五斛五人分之欲令三人得三二人得二問各幾何答曰三人人得一斛一斗五升十三分升之五二人人得七斗六升十三分升之十二術曰置三人人三二人人二為列襄副并為法以五斛乘未并者各自為實實如法得一斛返襄以爵次言之大夫五不更四欲令髙爵得多者當使大夫一人受五分不更一人受四分人數為母分數為子母同則子齊齊即襄也故上襄分冝以五四為列為今此令髙爵出少則當使大夫五人共出一人分不更四人共出一人分故謂
