body:
  text: 法得一斗禀前五人十五斗者大夫得五斗不更得四斗簮褭得三斗上造得二斗公士得一斗欲令五人各依所得粟多少减與後來大夫即與前來大夫同據前來大夫巳得五斗故言亦也各以所得斗數爲㐮并得十五而加後來大夫亦五斗凡二十爲法也是爲六人共出五斗後來大夫亦俱損折今有術副并爲所有率未并者各爲所求率五斗爲所有數而今有之即得今有禀粟五斛五人分之欲令三人得三二人得二問各幾何荅曰三人人得一斛一斗五升十三分升之五二人人得七斗六升十三分升之十二術曰置三人人三二人人二爲列㐮副并爲法以五斛乗未并者各自爲實實如法得一斛返㐮以爵次言之大夫五不更四欲令髙爵得多者當使大夫一人受五分不更一人受四分人數爲母分數爲子母同則子齊齊即㐮也故上㐮分冝以五四爲列爲今此令髙爵出少則當使大夫五人共出一人分不更四人共出一人分故謂
