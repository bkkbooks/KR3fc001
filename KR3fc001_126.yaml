body:
  text: 又有積六萬三千四百一尺五百一十二分尺之四百四十七問爲立方幾何荅曰三十九尺八分尺之七又有積一百九十三萬七千五百四十一尺二十七分尺之一十七問爲立方幾何荅曰一百二十四尺太半尺開立方立方適等求其一靣也術曰置積爲實借一筭歩之超二等言千之靣十言百萬之靣百議所得以再乗所借一筭爲法而除之再乗者亦求爲方羃以上議命而除之則立方等也除巳三之爲定法爲當復除故豫張三靣以定方羃爲定法也復除折而下復除者三靣方羃以皆自乗之數須得折議定其厚薄爾開平羃者方百之靣十開立羃者方千之靣十據定法巳有成方之羃故復除當以千爲百折下一等也以三乗所得數置中行設三廉之定長復借一筭置下行欲以爲隅方立方等未有定數且置一筭定其位歩之中超一下超二位上方法長自乗而一折中廉法但有長故降一等下隅法無靣長故又降一等也復置議以一乗中爲三廉備羃也再乗下令隅自乗爲方羃也皆副以加定法以定
