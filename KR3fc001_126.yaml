body:
  text: 又有積六萬三千四百一尺五百一十二分尺之四百四十七問為立方幾何答曰三十九尺八分尺之七又有積一百九十三萬七千五百四十一尺二十七分尺之一十七問為立方幾何答曰一百二十四尺太半尺開立方立方適等求其一靣也術曰置積為實借一算步之超二等言千之靣十言百萬之靣百議所得以再乘所借一算為法而除之再乘者亦求為方羃以上議命而除之則立方等也除巳三之為定法為當復除故豫張三靣以定方羃為定法也復除折而下復除者三靣方羃以皆自乘之數須得折議定其厚薄爾開平羃者方百之靣十開立羃者方千之靣十據定法巳有成方之羃故復除當以千為百折下一等也以三乘所得數置中行設三廉之定長復借一算置下行欲以為隅方立方等未有定數且置一算定其位步之中超一下超二位上方法長自乘而一折中廉法但有長故降一等下隅法無靣長故又降一等也復置議以一乘中為三廉備羃也再乘下令隅自乘為方羃也皆副以加定法以定
