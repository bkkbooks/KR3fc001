body:
  text: 亦以一爲一百二十乗之爲實實如法得從歩今有田廣一歩半三分歩之一四分歩之一五分歩之一六分歩之一七分歩之一求田一畒問從幾何荅曰九十二歩一百二十一分歩之六十八術曰下有七分以一爲四百二十半爲二百一十三分之一爲一百四十四分之一爲一百五五分之一爲八十四六分之一爲七十七分之一爲六十并之得一千八十九以爲法置田二百四十歩亦以一爲四百二十乗之爲實實如法得從歩今有田廣一歩半三分歩之一四分歩之一五分歩之一六分歩之一七分歩之一八分歩之一求田一畒問從幾何荅曰八十八歩七百六十一分歩之二百三十二
