body:
  text: 亦以一為一百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一求田一畒問從幾何答曰九十二步一百二十一分步之六十八術曰下有七分以一為四百二十半為二百一十三分之一為一百四十四分之一為一百五五分之一為八十四六分之一為七十七分之一為六十并之得一千八十九以為法置田二百四十步亦以一為四百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之一求田一畒問從幾何答曰八十八步七百六十一分步之二百三十二
