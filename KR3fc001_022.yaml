body:
  text: 今有邪田一頭廣三十步一頭廣四十二步正從六十四步問為田幾何答曰九畒一百四十四步又有邪田正廣六十五步一畔從一百步一畔從七十二步問為田幾何答曰二十三畒七十步術曰并兩邪而半之以乘正從若廣又可半正從若廣以乘并畒法而一并而半之者以盈補虛也今有箕田舌廣二十步踵廣五步正從五十步問為田幾何答曰一畒一百三十五步又有箕田舌廣一百一十七步踵廣五十步正從一百三十五步問為田幾何答曰四十六畒二百三十二步半術曰并踵舌而半之以乘正從畒法而一中分箕田則為兩邪田故其術相似又可并踵舌半正從以乘之今有圎田周三十步徑十步臣淳風等謹按術意以周三徑一為
