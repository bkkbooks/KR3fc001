body:
  text: 今有邪田一頭廣三十歩一頭廣四十二歩正從六十四歩問爲田幾何荅曰九畒一百四十四歩又有邪田正廣六十五歩一畔從一百歩一畔從七十二歩問爲田幾何荅曰二十三畒七十歩術曰并兩邪而半之以乗正從若廣又可半正從若廣以乗并畒法而一并而半之者以盈補虚也今有箕田舌廣二十歩踵廣五歩正從五十歩問爲田幾何荅曰一畒一百三十五歩又有箕田舌廣一百一十七歩踵廣五十歩正從一百三十五歩問爲田幾何荅曰四十六畒二百三十二歩半術曰并踵舌而半之以乗正從畒法而一中分箕田則爲兩邪田故其術相似又可并踵舌半正從以乗之今有圎田周三十歩徑十歩臣淳風等謹按術意以周三徑一爲
  hash: sha256:8e6edc4fdd33d1184c4e395c52b229d18ab406897adfdbd96cb557985ddea27d
