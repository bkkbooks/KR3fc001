body:
  text: 法以百錢乗未并者各自爲實實如法得一錢今有甲持粟三升乙持糲米三升丙持糲飯三升欲令合而分之問各幾何荅曰甲二升一十分升之七乙四升一十分升之五丙一升一十分升之八術曰以粟率五十糲米率三十糲飯率七十五爲㐮而返㐮之副并爲法以九升乗未并者各自爲實實如法得一升按此術三人所持升數雖等論其本率情麄不同米率雖少令最得多飯率雖多返使得少故令返之使精得多而麄得少於今有術副并爲所有率未并者各爲所求率九升爲所有數而今有之即得今有絲一斤價直二百四十今有錢一千三百二十八問得絲幾何荅曰五斤八兩一十二銖五分銖之四
