body:
  text: 法以百錢乘未并者各自為實實如法得一錢今有甲持粟三升乙持糲米三升丙持糲飯三升欲令合而分之問各幾何答曰甲二升一十分升之七乙四升一十分升之五丙一升一十分升之八術曰以粟率五十糲米率三十糲飯率七十五為襄而返襄之副并為法以九升乘未并者各自為實實如法得一升按此術三人所持升數雖等論其本率情粗不同米率雖少令最得多飯率雖多返使得少故令返之使精得多而粗得少於今有術副并為所有率未并者各為所求率九升為所有數而今有之即得今有絲一斤價直二百四十今有錢一千三百二十八問得絲幾何答曰五斤八兩一十二銖五分銖之四
  hash: sha256:a033bf132fbfd2fc2597b6d571e4729d6c26d04343c822023aa82b6f6b8a7a03
