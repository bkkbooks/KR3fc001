body:
  text: 之三又有九分之八七分之六問孰多多幾何荅曰九分之八多多六十三分之二又有二十一分之八五十分之十七問孰多多幾何荅曰二十一分之八多多一千五十分之四十三課分臣淳風等謹按分各異名理不齊一校其相多之數故曰課分也術曰母互乗子以少减多餘爲實母相乗爲法實如法而一即相多也臣淳風等謹按此術母互乗子以少分减多分按此術多與減分義同唯相多之數意共减分有異减分知求其餘數有幾課分知以其餘數相多也今有三分之一三分之二四分之三問减多益少各幾何而平荅曰减四分之三者二三分之二者一并以益三分之一而各平於十二分之七又有二分之一三分之二四分之三問减多益
