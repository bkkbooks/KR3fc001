body:
  text: 之三又有九分之八七分之六問孰多多幾何答曰九分之八多多六十三分之二又有二十一分之八五十分之十七問孰多多幾何答曰二十一分之八多多一千五十分之四十三課分臣淳風等謹按分各異名理不齊一校其相多之數故曰課分也術曰母互乘子以少減多餘為實母相乘為法實如法而一即相多也臣淳風等謹按此術母互乘子以少分減多分按此術多與減分義同唯相多之數意共減分有異減分知求其餘數有幾課分知以其餘數相多也今有三分之一三分之二四分之三問減多益少各幾何而平答曰減四分之三者二三分之二者一并以益三分之一而各平於十二分之七又有二分之一三分之二四分之三問減多益
