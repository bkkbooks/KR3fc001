body:
  text: 術曰以粟求糵七之二而一臣淳風等謹按糵率一百七十有五合以此數乗其本粟術欲從省先以等數二十五約之所求之率得七所有之率得二故七乗二除今有糲米十五斗五升五分升之二欲爲粟問得幾何荅曰爲粟二十五斗九升術曰以糲米米粟五之三而一臣淳風等謹按上術以粟求米故粟爲所有數三爲所求率五爲所有率今此以米求粟故米爲所有數五爲所求率三爲所有率准都術求之各合其數以下所有反求多同皆准此今有粺米二斗欲爲粟問得幾何荅曰爲粟三斗七升二十七分升之一術曰以粺米求粟五十之二十七而一今有糳米三斗少半升欲爲粟問得幾何荅曰爲粟六斗三升三十六分升之七術曰以糳米求粟二十五之十二而一今有御米十四斗欲爲粟問得幾何
  hash: sha256:9a5d7a08f7fa144040991ebb0e57dad1a031bef4a04b0dc62f6675ed47b33d98
