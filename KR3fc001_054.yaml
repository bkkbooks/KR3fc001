body:
  text: 術曰以粟求糵七之二而一臣淳風等謹按糵率一百七十有五合以此數乘其本粟術欲從省先以等數二十五約之所求之率得七所有之率得二故七乘二除今有糲米十五斗五升五分升之二欲為粟問得幾何答曰為粟二十五斗九升術曰以糲米米粟五之三而一臣淳風等謹按上術以粟求米故粟為所有數三為所求率五為所有率今此以米求粟故米為所有數五為所求率三為所有率准都術求之各合其數以下所有反求多同皆准此今有稗米二斗欲為粟問得幾何答曰為粟三斗七升二十七分升之一術曰以稗米求粟五十之二十七而一今有糳米三斗少半升欲為粟問得幾何答曰為粟六斗三升三十六分升之七術曰以糳米求粟二十五之十二而一今有御米十四斗欲為粟問得幾何
