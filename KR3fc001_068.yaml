body:
  text: 二千一十三錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤斤率之問各幾何荅曰其一石二鈞七斤十兩四銖斤六十七錢其二十斤九兩一銖斤六十八錢今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤兩率之問各幾何荅曰其一石一鈞一十七斤一十四兩一銖兩四錢其一鈞一十斤五兩四銖兩五錢其率其率如欲令無分按出錢五百七十六買竹七十八箇以除錢得七實餘三十是爲三十箇復可增一錢然則實餘之數則是貴者之數故曰實貴出本以七十八箇爲法今以貴者減之則其餘悉是賤者之數故曰法賤也其求石鈞斤兩以
  hash: sha256:b28d8fe0aad1f8db1560a9e847e3d5c4581ec7ae9437a7cd540a83ced31f3d28
