body:
  text: 術曰以一車積尺乘程行步數為實置今往來步數加載輸之間一里以車六人乘之為法除之所得即一人所到尺按此術今有之義以載輸及往來并得五百步為所有行率車載三十四尺七寸為所求到土率程行五十八里通之為步為所有數而今有之所得則一車所到欲得人到者當以六人除之即得術有分故亦更令乘法而并除者亦用以半尺數以為一人到土率六人乘五百步為行率也又亦可五百步為行率令六人約半積尺數為一人到土率以載土術入之入之者亦可求返數也要取其會通而巳術恐有分故令乘法而并除以所到積尺約即用徒人數者以一人所積尺除其衆積故得用徒人數也以所到約積尺即用徒人數今有委粟平地下周一十二丈髙二丈問積及為粟幾何答曰積八千尺於徽術當積七千六百四十三尺一百五十七分尺之四十九臣淳風等謹依密率為積七千六百三十六尺十一分尺之四為粟二千九百六十二斛二十七分斛之二十六於徽術當粟二千八百三十斛一千四百
