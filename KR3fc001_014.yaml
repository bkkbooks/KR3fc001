body:
  text: 分錢之三問人得幾何答曰人得二錢八分錢之一經分臣淳風等謹按經分者自合分巳下皆與諸分相齊此乃直求一人之分以人數分所分故曰經分也術曰以人數為法錢數為實實如法而一有分者通之母互乘子如齊其子母相乘者同其母以母通之者分母乘全內子乘散全則為積分積分則與分子相通之故可令相從凡數相與者謂之率率知自相與通有分則可散分重疊則約也等除法實相與率也故散分者必令兩分母相乘法實也重有分者同而通之又以法分母乘實實分母乘法此謂法實具有分故令分母各乘全分內子又令分母互乘上下今有田廣七分步之四從五分步之三問為田幾何答曰三十五分步之十二又有田廣九分步之七從十一分步之九問為田幾何答曰十一分步之七又有田廣五分步之四從九分步之五問為田幾何
