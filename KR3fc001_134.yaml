body:
  text: 為靣句得積一萬五千六百二十五尺之靣皆以六百二十五約之外立方積六百七十五尺之靣中立方積二十五尺之靣也張衡算又謂立方為質立圎為渾衡言質之與中外之渾六百七十五尺之靣開方除之不足一謂外質積二十六也內渾二十五之靣謂積五尺也今徽令質言中渾渾又言質則二質相與之率猶衡二渾相與之率也衡蓋亦先二質之率推以言渾之率也衡又言質六十四之靣渾二十五之靣質復言渾謂居質八分之五也又云方八之靣圎圎渾相推知其復以圎囷為方率渾為圎率也失之逺矣衡説之自然欲協其隂陽竒耦之説而不顧踈密矣雖有文辭斯亂道破義病也置外質積二十六以九乘之十六而一得積十四尺八分之五即質中之渾也以分母乘全內子得一百一十七又置內質積五以分母乘之得四十是為質居渾一百一十七分之四十而渾率猶為傷多也假令方二尺方四靣井得八尺也謂之方周其中令圎徑與方等亦二尺也九半徑以乘圎周之半即圎羃也半方以乘方周之半即方羃也然則方周知方羃之率也圎周知圎羃之率也按如衡術方周率八之靣圎周率五之靣也令方周六十四尺之靣即圎周四十尺之靣也又令徑二尺自乘得徑四尺之靣是為圎周率十二之靣而徑率一之靣也衡亦以周三徑一之率為非是故更著此法然增周太多過其實矣臣淳風等謹按祖之謂劉徽張衡二人皆以圎囷為方率丸為圎率乃設新法祖之開立圎術曰以二乘積開立方除之即立圎徑其意何也取立方棊一放令立樞於左後之下隅從規去其右上之廉又合而橫規之去其前上之廉於是立方之棊分
