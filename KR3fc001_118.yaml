body:
  text: 十四分之一為六千九百三十五分之一為五千五百四十四六分之一為四千六百二十七分之一為三千九百六十八分之一為三千四百六十五九分之一為三千八十十分之一為二千七百七十二十一分之一為二千五百二十十二分之一為二千三百一十并之得八萬六千二十一以為法置田二百四十步亦以一為二萬七千七百二十乘之以為實實如法得從步其術亦得知不繁也今有積五萬五千二百二十五步問為方幾何答曰二百三十五步又有積二萬五千二百八十一步問為方幾何答曰一百五十九步又有積七萬一千八百二十四步問為方幾何答曰二百六十八步又有積五十六萬四千七百五十二步四分步之一問為方幾何答曰七百五十一步半又有積三十九億七千二百一十五萬六百二十五步問為方幾何答曰六萬三千二十五步開方求方羃之一靣也
