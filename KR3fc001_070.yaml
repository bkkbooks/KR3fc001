body:
  text: 積銖各除法實各得其積數餘各為銖知謂石鈞斤兩積銖除實以石鈞斤兩積銖除法餘各為銖即合所問術曰各置所買石鈞斤兩以為法以所率乘錢數為實實如法而一不滿法者反以實減法法賤實貴今有出錢一萬三千九百七十買絲一石二鈞二十八斤三兩五銖欲其貴賤銖率之問各幾何答曰其一鈞二十斤六兩十一銖五銖一錢其一石一鈞七斤一十二兩一十八銖六銖一錢今有出錢六百二十買羽二千一百翭翭羽本也數羽稱其本猶數草本稱其根株欲其貴賤率問各幾何答曰其一千一百四十翭三翭一錢其九百六十翭四翭一錢
