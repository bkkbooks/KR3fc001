body:
  text: 術曰置積為實借一算步之超一等言百之靣十也言萬之靣百也議所得以一乘所借一算為法而以除先得黃甲之靣上下相命是自乘而除也除巳倍法為定法倍之者豫張兩靣朱羃定袤以待復除故曰定法其復除折法而下欲除朱羃者本當副置所得成方倍之為定法以折議乘而以除如是當復步之而止乃得相命故使就上折下復置借算步之如初以復議一乘之欲除朱羃之角黃乙之羃其意如初之所得也所得副以加定法以除以所得副從定法再以黃乙之靣加定法者是則張兩青羃之袤復除折下如前若開之不盡者為不可開當以靣命之術或有以借算加定法而命分者雖粗相近不可用也凡開積為方方之自乘當還復其積分令不加借算而命分則常微少其加借算而命分則又微多其數不可得而定故惟以靣命之為不失耳譬猶以三除十以其餘為三分之一而復其數可舉不以靣命之加定法如前求其微數微數無名者以為分子其一退以十為母其再退以百為母退之彌下其分彌細則朱羃雖有所乘之數不足言之也若實有分者通分內子為定實乃開之訖開其母報除臣淳風等謹桉分母可開者並通之積先合二母既開之後一母尚存故開分母求一母為法以報除也若母不可開者又以母再乘
