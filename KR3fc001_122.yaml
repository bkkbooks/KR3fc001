body:
  text: 定實乃開之訖令如母而一臣淳風等謹桉分母不可開者本一母也又以母乘之乃合二母既開之後亦一母存焉故令一母而一得全靣也又按此術開方者求方羃之靣也惜一算者假借一算空有列位之名而無除積之實方隅得靣是故借算列之於下步之超一等者方十自乘其積有百方百自乘其積有萬故超位至百而言十至萬而言百議所得以一乘所借算為法而以除者先得黃甲之靣以方為積者兩相乘故開方除之還令兩靣上下相命是自乘而除之除巳倍法為定法者實積未盡當復更除故豫張兩靣朱羃袤以待復除故曰定法其復除折法而下者欲除朱羃本當副置所得成方倍之為定法以折議乘之而以除如初是當復步之而止乃得相命故使就上折之而下復置借算步之如初以復議一乘之所得副以加定法以定法除者欲除朱羃之角黃乙之羃以所得副從定法者再以黃乙之羃加定法是則張兩青羃之袤故如前開之即合所問今有積一千五百一十八步四分步之三問為圎周幾何答曰一百三十五步於徽術當周一百三十八步一十分步之一臣淳風等謹按此依密率為周一百三十八步五十分步之九又有積三百步問為圎周幾何答曰六十步於徽術當周六十一步五十分步之十九臣
