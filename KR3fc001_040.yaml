body:
  text: 等謹按宻率爲田二畒二百三十一歩一千四百八分歩之七百一十七七術曰并中外周而半之以徑乗之爲積歩此田截而中之周則爲長并而半之知亦以盈補虚也此可令中外周各自爲圎田以中圎减外圎餘則環實也按此術并中外周歩數於上分母子於下母乗子者爲中外周俱有分故以互乗齊其子母相乗同其母子齊母同故通全歩内分子半之知以盈補虚得中平之周周則爲從徑則爲廣故廣從相乗而得其積旣合分母還湏分母出之故令周徑分母相乗而連除之即得積歩不盡以等數除之而命分以畒法除積歩得畒數也宻率術曰置中外周歩數分子各居其下母互乗子通全歩内分子以中周减外周餘半之徑亦通分内子以乗周爲宻實分母相乗爲法除之爲積歩餘積歩之分以畒法除之即畒數也九章筭經卷第一
