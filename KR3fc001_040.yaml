body:
  text: 等謹按密率為田二畒二百三十一步一千四百八分步之七百一十七七術曰并中外周而半之以徑乘之為積步此田截而中之周則為長并而半之知亦以盈補虛也此可令中外周各自為圎田以中圎減外圎餘則環實也按此術并中外周步數於上分母子於下母乘子者為中外周俱有分故以互乘齊其子母相乘同其母子齊母同故通全步內分子半之知以盈補虛得中平之周周則為從徑則為廣故廣從相乘而得其積既合分母還須分母出之故令周徑分母相乘而連除之即得積步不盡以等數除之而命分以畒法除積步得畒數也密率術曰置中外周步數分子各居其下母互乘子通全步內分子以中周減外周餘半之徑亦通分內子以乘周為密實分母相乘為法除之為積步餘積步之分以畒法除之即畒數也九章算經卷第一
