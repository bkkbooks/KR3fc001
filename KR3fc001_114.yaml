body:
  text: 分步之一六分步之一七分步之一八分步之一九分步之一十分步之一十一分步之一求田一畒問從幾何答曰七十九步八萬三千七百一十一分步之三萬九千六百三十一術曰下有一十一分以一為二萬七千七百二十半為一萬三千八百六十三分之一為九千二百四十四分之一為六千九百三十五分之一為五千五百四十四六分之一為四千六百二十七分之一為三千九百六十八分之一為三千四百六十五九分之一為三千八十一十分之一為二千七百七十二一十一分之一為二千五百二十並之得八萬三千七百一十一以為法置田二百四十步亦以一為二萬七千七百二十乘之為實實如法得從步今有田廣一步半三分步之一四分步之一五分步之一六分步之一七分步之一八分步之
