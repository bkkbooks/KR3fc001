body:
  text: 為法少者多之始一者數之母故為率者必等之於一據粟率五糲率三是粟五而為一糲米三而為一也欲化粟為米者糲當先本是一一者謂以五約之令五而為一也訖乃以三乘之令一而為三如是則率至於一以五為三矣然先除後乘或有餘分故術反之又完言之知粟五升為糲米三升分言之知粟一斗為糲米五分斗之三以五為母三為子以粟求糲米者乘其母報除也然則所求之率常為母也臣淳風等謹按冝云所求之率常為子所有之率常為母今乃云所求之率常為母知脫錯也實如法而一今有粟一斗欲為糲米問得幾何答曰為糲米六升術曰以粟米糲米三之五而一臣淳風等謹按都術以所求率乘所有數以所有率為法此術以粟求米故粟為所有數三是米率故三為所求率五為粟率故五為所有率粟率五十米率三十退位求之故唯云三五也今有粟二斗一升欲為稗米問得幾何答曰為稗米一斗一升五十分升之十七術曰以粟米稗米二十七之五十而一臣淳風等謹按稗米之率二十有七故直以二十七之五十而一也今有粟四斗五升欲為糳米問得幾何
